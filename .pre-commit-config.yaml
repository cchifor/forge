repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^forge/templates/
      - id: end-of-file-fixer
        exclude: ^forge/templates/
      - id: check-yaml
        exclude: ^forge/templates/
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=512"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^forge/
        exclude: ^forge/templates/
      - id: ruff-format
        files: ^forge/
        exclude: ^forge/templates/

  - repo: local
    hooks:
      - id: ty
        name: ty typecheck
        entry: uv run ty check forge/
        language: system
        pass_filenames: false
        files: ^forge/.*\.py$
        exclude: ^forge/templates/
