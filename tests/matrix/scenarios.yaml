  # port_base 8150 reserved for frontend_only_vue (backend.mode=none) —
  # deferred pending a forge/cli/builder.py fix to honor `backends: []`
  # (today the truthiness check at _build_backends_from_cfg drops the
  # empty list into the single-backend placeholder fallback). Do not
  # reuse 8150 until the scenario lands.
  - name: stateless_py
    description: Python-only, database.mode=none (no postgres/alembic)
    lanes: [generate, verify, roundtrip, update]
    port_base: 8160
    expected_files:
      - services/api/pyproject.toml
      - docker-compose.yml
    config:
      project_name: "Stateless Py"
      include_keycloak: false
      backends:
        - name: api
          language: python
          features: ["items"]
          server_port: 8160
          python_version: "3.13"
      options:
        database.mode: "none"

  - name: py_schema_token_claim
    description: Python schema-per-tenant multitenancy resolved by token_claim
    lanes: [generate, verify]
    port_base: 8170
    expected_files:
      - services/api/pyproject.toml
      - docker-compose.yml
      - forge.toml
    config:
      project_name: "Py Schema Tenant"
      include_keycloak: false
      backends:
        - name: api
          language: python
          features: ["items"]
          server_port: 8170
          python_version: "3.13"
      options:
        # in_memory exercises the schema-per-tenant UoW binder alongside a real
        # (zero-dependency) auth stack, and guards the in_memory_issuer /
        # platform_auth_setup ty-0.0.46 fixes from regressing.
        auth.mode: "generate"
        auth.provider: "in_memory"
        database.multitenancy: "schema_per_tenant"
        database.tenant_resolution: "token_claim"

  # Port-compile scenarios (#213) — the tri-language port code (queue / cache /
  # llm / webhooks) was only ever asserted by string-matching; nothing actually
  # compiled it. These two enable the real Node/Rust port adapters in lanes
  # [generate, verify] so `tsc --noEmit` / `cargo build` catch a broken adapter
  # on PR instead of shipping it. (They surfaced the AI-SDK `ToolSet` type drift
  # and the duplicate routes-marker that this PR fixes.)
  - name: node_ports
    description: Node port adapters compile — queue (bullmq) + response_cache + llm (openai) + webhooks, headless
    lanes: [generate, verify]
    port_base: 8180
    expected_files:
      - services/api/package.json
      - docker-compose.yml
    config:
      project_name: "Node Ports"
      include_keycloak: false
      backends:
        - name: api
          language: node
          features: ["items"]
          server_port: 8180
          node_version: "22"
      options:
        queue.backend: bullmq
        middleware.response_cache: true
        llm.provider: openai
        platform.webhooks: true

  - name: rust_ports
    description: >-
      Rust port adapters compile — llm.provider=openai + queue=apalis +
      reliability.cache + webhooks all on one backend. Exercises the shared
      ports/mod.rs + adapters/mod.rs injection (#236) and the apalis consumer
      rewritten against apalis 0.6's public WorkerBuilder API (#235). Every
      Rust port + adapter now coexists; this scenario locks that in.
    lanes: [generate, verify]
    port_base: 8190
    expected_files:
      - services/api/Cargo.toml
      - docker-compose.yml
    config:
      project_name: "Rust Ports"
      include_keycloak: false
      backends:
        - name: api
          language: rust
          features: ["items"]
          server_port: 8190
          rust_edition: "2024"
      options:
        llm.provider: openai
        queue.backend: apalis
        reliability.cache: memory
        platform.webhooks: true
