# Single source of truth for the forge config-matrix validation runs.
#
# Each scenario describes one configuration forge is expected to generate
# cleanly. The runner in ``tests/matrix/runner.py`` consumes this file and
# drives each scenario through up to five lanes:
#
#   A — generate (always; runs on every PR, ~1 min/scenario)
#   B — toolchain verify (every PR, parallel matrix, ~5 min/scenario)
#   C — compose-up smoke (nightly or label-gated, ~10 min/scenario)
#   D — roundtrip (nightly, opt-in; exercises harvest + apply-back FR1/FR2
#       invariants — see docs/round-trip.md)
#   E — update (nightly, opt-in; exercises ``forge --update`` in all three
#       merge modes + ``forge --harvest`` JSON probe via the CLI.)
#
# ``lanes`` lists which lanes are applicable. Scenarios on a backend whose
# toolchain can't be invoked in CI (e.g. a plugin backend without a linter
# container) can drop to ``[generate]``.
#
# ``port_base`` allocates 10 ports starting from the given value — per-
# scenario isolation so lane C compose-up runs don't collide when the
# matrix runs in parallel.

schema_version: 1

scenarios:
  - name: py_vue_full
    description: Python + Vue + Keycloak + agent + RAG (chroma) + rate limit + OTel
    lanes: [generate, verify, smoke, update]
    port_base: 8010
    expected_files:
      - services/api/pyproject.toml
      - apps/frontend/package.json
      - docker-compose.yml
      - forge.toml
    config:
      project_name: "Py Vue Full"
      include_keycloak: true
      keycloak_port: 18080
      backends:
        - name: api
          language: python
          features: ["items"]
          server_port: 8010
          python_version: "3.13"
      frontend:
        framework: vue
        include_auth: true
        include_chat: false
        server_port: 5173
      options:
        rag.backend: chroma
        middleware.rate_limit: true
        observability.otel: true

  - name: py_svelte_min
    description: Python + Svelte, no auth, no options
    # Cross-stack opt-in for lane D (roundtrip) — covers a Python +
    # frontend scenario in addition to py_only_headless (Python-only).
    lanes: [generate, verify, smoke, roundtrip, update]
    port_base: 8020
    expected_files:
      - services/api/pyproject.toml
      - apps/frontend/package.json
      - docker-compose.yml
    config:
      project_name: "Py Svelte Min"
      include_keycloak: false
      backends:
