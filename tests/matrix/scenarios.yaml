          language: python
          features: ["items"]
          server_port: 8020
          python_version: "3.13"
      frontend:
        framework: svelte
        include_auth: false
        include_chat: false
        server_port: 5174

  - name: node_vue_full
    description: Node + Vue + Keycloak + queue_redis + rate_limit + OTel
