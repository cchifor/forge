name: E2E

# Runs the slow, toolchain-heavy end-to-end suite: generates full
# projects for every backend + frontend matrix and runs each
# generated project's native test suite (pytest / vitest / cargo /
# flutter test). Scheduled nightly + on PRs touching templates /
# generator.

on:
  schedule:
    - cron: "0 5 * * *"  # 05:00 UTC daily
  workflow_dispatch:
    inputs:
      pytest_filter:
        description: >-
          Optional pytest -k expression for an on-demand run of the unfiltered
          nightly job (e.g. a single flagship test to confirm a fix). Injected
          via PYTEST_ADDOPTS so the run command stays literally unfiltered;
          leave blank to run the whole suite.
        required: false
        default: ""
  pull_request:
    paths:
      - "forge/templates/**"
      - "forge/generator.py"
      - "forge/docker_manager.py"
      - "forge/codegen/**"
      - "forge/appliers/**"
      - "forge/sync/merge.py"
      - "forge/sync/provenance.py"
      - "forge/sync/forge_to_project/**"
      - "forge/injectors/**"
      - "tests/e2e/**"
      - ".github/workflows/e2e.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-core:
    name: forge-own-tests (python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Forge declares ``requires-python = ">=3.13"``; older versions
        # would expand CI runtime without protecting any contract we owe
        # downstream users.
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Sync dependencies
        run: uv sync --all-groups
      - name: Run forge's own test suite (non-e2e)
        # ``--ignore=tests/e2e`` skips the directory; ``-m "not e2e"`` skips
        # tests outside that dir tagged with the marker (FR2/RF1 round-trip
        # tests in tests/test_harvest_invariants.py spin up full projects
        # and would blow past the 15-min timeout otherwise — they run in
        # the e2e-generated job below + the matrix-nightly roundtrip lane).
        run: uv run pytest --no-cov --ignore=tests/e2e -m "not e2e"

  e2e-generated:
    name: generated-project suites (${{ matrix.preset }})
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: e2e-core
    strategy:
      fail-fast: false
      matrix:
        # Names map to ``test_<preset>_*`` in tests/e2e/test_full_generation.py
        # (the workflow translates hyphens to underscores before passing
        # to ``pytest -k``). Matrix display labels keep the friendlier
        # hyphenated form.
        preset:
          - python-vue
          - node-svelte
          - rust-no-frontend
          - multi-backend-with-keycloak
          # WS-5.1 — un-dark the chat-on type-check lanes. These map to
          # test_vue_chat_on_typechecks / test_svelte_chat_on_typechecks /
          # test_flutter_full_analyzes, which existed but were never selected
          # by the matrix, so the generated chat surfaces shipped untested.
          - vue-chat
          - svelte-chat
          - flutter-full
          # Layer-3 seed templates (greenfield) — the pre-validation gate:
          # map to test_console_template_* / test_chatfirst_template_*.
          - console-template
          - chatfirst-template
          # Layer-1 EntityList — greenfield contract-types + brownfield binding
          # (static vue-tsc) + brownfield runtime (mock server -> generated
          # adapter): -k entitylist matches all three test_entitylist_* functions.
          - entitylist
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Install Python 3.13
        run: uv python install 3.13

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # pinned stable

      - name: Install Flutter (only for flutter presets)
        if: startsWith(matrix.preset, 'flutter-') || matrix.preset == 'multi-backend-keycloak'
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          # The generated Flutter app targets a modern toolchain (flutter_lints
          # ^6, riverpod ^3, freezed ^3, go_router ^17 all floor at Dart ^3.8.0).
          # Track the latest stable so `flutter pub get` can resolve them; the
          # old 3.24.x pin shipped Dart 3.5.4 and failed version solving.
          channel: stable
          cache: true

      - name: Cache cargo registry & target
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            /tmp/forge-e2e-*/target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('forge/templates/services/rust-service-template/template/Cargo.toml.jinja') }}

      - name: Configure git identity
        run: |
          git config --global user.email "ci@forge.local"
          git config --global user.name "Forge CI"

      - name: Install forge
        run: uv sync --all-groups

      - name: Run e2e suite (preset ${{ matrix.preset }})
        env:
          FORGE_E2E_PRESET: ${{ matrix.preset }}
        # Test functions in tests/e2e/ use snake_case naming
        # (``test_python_vue_*``) so translate matrix preset's hyphens
        # to underscores before passing to ``pytest -k``.
        run: |
          PRESET="${{ matrix.preset }}"
          uv run pytest -m e2e -v --no-cov -k "${PRESET//-/_}"

  # Nightly-only: run the ENTIRE e2e suite with no -k filter. The PR presets
  # above select ~12 of ~59 e2e tests by name; the rest (standalone-build,
  # layout-builds, platform-compose-boot, tenant-isolation, …) were dark in
  # every workflow. This un-darks them. ``-rs`` reports skips so an env-gated
  # test is visible rather than a silent pass. tests/test_e2e_coverage.py
  # guards that this job stays unfiltered.
  e2e-nightly-full:
    name: full e2e suite (unfiltered, nightly)
    # Scheduled nightly + on-demand (workflow_dispatch) so a maintainer can
    # confirm a flagship fix without waiting up to 24h for the next cron — the
    # platform compose-boot tests live ONLY in this job, so they were otherwise
    # un-reproducible on demand. Stays off the PR path (still expensive).
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: e2e-core
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Install Python 3.13
        run: uv python install 3.13
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # pinned stable
      - name: Install Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true
      - name: Configure git identity
        run: |
          git config --global user.email "ci@forge.local"
          git config --global user.name "Forge CI"
      - name: Install forge
        run: uv sync --all-groups
      - name: Run the full e2e suite (unfiltered)
        # Opt env-gated suites IN so they exercise rather than skip (the
        # platform drop-in suite gates on FORGE_E2E_PLATFORM). On a manual
        # dispatch with `pytest_filter`, PYTEST_ADDOPTS narrows the selection
        # (the run line below stays literally unfiltered so the
        # test_e2e_coverage guard keeps the scheduled nightly honest).
        env:
          FORGE_E2E_PLATFORM: "1"
          PYTEST_ADDOPTS: ${{ inputs.pytest_filter != '' && format('-k {0}', inputs.pytest_filter) || '' }}
        run: uv run pytest -m e2e -v -rs --no-cov

  e2e-canvas-packages:
    name: canvas packages build + typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      # Workspace-aware install at the repo root — `packages/canvas-vue`
      # and `packages/canvas-svelte` depend on the in-tree
      # `@forge/canvas-core` via `npm workspaces` (see root
      # `package.json`). Installing inside each sub-package directly
      # would fail with "Cannot find module '@forge/canvas-core'"
      # because that dep is unpublished and only resolves through the
      # workspace symlink that the root-level install creates.
      - name: workspace install (root)
        run: npm install --no-fund --no-audit

      - name: canvas-core — build (workspace dep of the canvas-* packages)
        run: npm run --workspace=@forge/canvas-core build

      - name: canvas-vue — typecheck + build
        working-directory: packages/canvas-vue
        run: |
          npm run typecheck
          npm run build

      - name: canvas-svelte — build
        working-directory: packages/canvas-svelte
        run: npx vite build

      - name: Install Flutter for forge_canvas
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: "3.24.x"
          cache: true

      - name: forge_canvas — analyze
        working-directory: packages/forge-canvas-dart
        run: |
          flutter pub get
          flutter analyze --no-fatal-infos

      - name: forge_canvas — test (if tests exist)
        working-directory: packages/forge-canvas-dart
        run: |
          if [ -d test ]; then flutter test; else echo "no tests yet"; fi

  # Notify maintainers when the SCHEDULED nightly e2e suite fails (#217 — a
  # failing nightly that nobody sees is how regressions ship). Schedule-only;
  # de-dupes onto the shared open ``nightly-failure`` tracking issue.
  notify-e2e-nightly-failure:
    # e2e-nightly-full `needs: e2e-core`, so an e2e-core failure SKIPS the
    # nightly job (result 'skipped', not 'failure'). Watch both so a broken
    # prerequisite still notifies instead of dying silently.
    needs: [e2e-core, e2e-nightly-full]
    if: >-
      always() &&
      github.event_name == 'schedule' &&
      (needs.e2e-core.result == 'failure' ||
       needs.e2e-nightly-full.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open or update the nightly-failure tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          gh label create nightly-failure --color B60205 \
            --description "An automated nightly workflow failed" 2>/dev/null || true
          body=$(printf '%s\n' \
            "The scheduled full e2e suite (\`e2e-nightly-full\`) failed on $(date -u +%Y-%m-%dT%H:%MZ)." \
            "" \
            "Run: ${RUN_URL}" \
            "" \
            "Reproduce locally with \`uv run pytest -m e2e\`; see the job log for the failing test(s).")
          existing=$(gh issue list --state open --label nightly-failure \
            --search "Nightly CI failed in:title" \
            --json number --jq '.[0].number // empty' 2>/dev/null || true)
          if [ -n "${existing}" ]; then
            gh issue comment "${existing}" --body "${body}"
          else
            gh issue create --title "Nightly CI failed" \
              --label nightly-failure --body "${body}"
          fi
