name: Matrix nightly (lane C smoke + lane D roundtrip + lane E update)

# Runs nightly heavyweight matrix lanes:
#
# * Lane C — RFC-006 HTTP smoke contract. Each scenario spins up its own
#   docker-compose stack, hits the contract endpoints, and tears down.
#   Excluded from PR runs because per-scenario wall-clock runs ~10 min
#   (Docker pull + compose up + tests + teardown).
# * Lane D — bidirectional-sync round-trip (Phase 5). Each opted-in
#   scenario generates twice (project-a + project-b) with a harvest /
#   apply-back cycle in between; ~2 min/scenario. Exercises the FR1
#   invariant (fresh-generate emits zero block/files candidates) and
#   stages a synthetic block edit when the scenario surface allows.
# * Lane E — forge --update + forge --harvest e2e (WS4). For every
#   scenario, shells out to ``python -m forge --update --mode
#   {merge,skip,overwrite}`` against an edited fragment-authored file
#   plus a single ``forge --harvest --harvest-out=-`` JSON probe.
#   Exercises the argparse / builder / dispatcher path real users hit,
#   complementing lane D's direct Python-API round-trip.
#
# Also triggerable manually (workflow_dispatch) or when a PR is labeled
# ``ci:matrix-smoke`` so contributors can exercise these lanes on
# demand for changes that touch fragment templates, docker-compose
# rendering, or the harvest / apply-back substrate.
#
# Theme 3C — a narrower label, ``ci:compose-smoke``, fires only the
# lane C smoke job against the fast subset (``py_svelte_min`` +
# ``node_svelte_min``). This mirrors ``make validate-matrix-fast`` and
# is intended for PRs that touch the compose stack but do not warrant
# the full nightly fan-out. The unconditional PR-time
# ``ci.yml::matrix-smoke-fast`` job covers the same scenarios on every
# PR; ``ci:compose-smoke`` is the on-demand re-run hook (e.g. after a
# flaky teardown) or a deliberate signal that compose drift is the
# focus of review. Default PRs (no label) trigger neither variant.

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC nightly
  workflow_dispatch:
  pull_request:
    types: [labeled]

permissions:
  contents: read

concurrency:
  group: matrix-nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gate the label-triggered variants so random labels don't fire this.
  # Two recognised labels:
  #   * ``ci:matrix-smoke``   — full fan-out (smoke + roundtrip + update
  #     across every opted-in scenario), same shape as the nightly run.
  #   * ``ci:compose-smoke``  — Theme 3C fast subset: only the lane C
  #     smoke job against ``[py_svelte_min, node_svelte_min]``. Roundtrip
  #     and update lanes are suppressed by emitting empty scenario lists
  #     (their job-level ``if:`` already short-circuits on ``'[]'``).
  gate:
    if: >-
      github.event_name != 'pull_request' ||
      github.event.label.name == 'ci:matrix-smoke' ||
      github.event.label.name == 'ci:compose-smoke'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      scenarios: ${{ steps.load.outputs.scenarios }}
      roundtrip_scenarios: ${{ steps.load.outputs.roundtrip_scenarios }}
      update_scenarios: ${{ steps.load.outputs.update_scenarios }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          enable-cache: true
      - name: Install
        run: uv sync --all-extras --dev
      - name: Validate scenarios.yaml schema
        # Front-load schema validation so malformed YAML fails the gate
        # with the schema test's error message instead of a buried
        # KeyError inside the inline-Python emit step below. Reuses the
        # tests/matrix/test_scenarios_schema.py harness so the workflow
        # and the test suite never drift on what counts as a valid
        # scenario.
        run: uv run pytest tests/matrix/test_scenarios_schema.py -v --no-cov
      - id: load
        name: Emit scenario lists as JSON
        env:
          # Empty on schedule / workflow_dispatch — both fall through the
          # ``if`` block below into the full-fan-out branch, which matches
          # pre-Theme-3C behaviour.
          FORGE_TRIGGER_LABEL: ${{ github.event.label.name }}
        run: |
          uv run python -c '
          import json, os, yaml
          data = yaml.safe_load(open("tests/matrix/scenarios.yaml"))
          label = os.environ.get("FORGE_TRIGGER_LABEL", "")
          # Theme 3C — ``ci:compose-smoke`` fires only the fast subset
          # of lane C. Mirrors ``make validate-matrix-fast``; the two
          # scenarios are also the PR-time critical path in
          # ``ci.yml::matrix-smoke-fast``. Roundtrip / update lanes are
          # suppressed via ``[]`` so their ``if:`` short-circuits.
          if label == "ci:compose-smoke":
              smoke_names = ["py_svelte_min", "node_svelte_min"]
              roundtrip_names: list[str] = []
              update_names: list[str] = []
          else:
              # Schedule, workflow_dispatch, or ``ci:matrix-smoke`` — full
              # fan-out across every opted-in scenario.
              # Lane C — scenarios opted into ``smoke``.
              smoke_names = [
                  s["name"] for s in data["scenarios"] if "smoke" in s.get("lanes", [])
              ]
              # Lane D — scenarios opted into ``roundtrip`` (Phase 5).
              roundtrip_names = [
                  s["name"] for s in data["scenarios"] if "roundtrip" in s.get("lanes", [])
              ]
              # Lane E (WS4) — scenarios opted into ``update``.
              update_names = [
                  s["name"] for s in data["scenarios"] if "update" in s.get("lanes", [])
              ]
          print(f"scenarios={json.dumps(smoke_names)}")
          print(f"roundtrip_scenarios={json.dumps(roundtrip_names)}")
          print(f"update_scenarios={json.dumps(update_names)}")
          ' >> "$GITHUB_OUTPUT"

  smoke:
    needs: gate
    runs-on: ubuntu-latest
    # Cap individual smoke scenarios — a hung docker compose stack will
    # otherwise idle for github's 6-hour default. ~10 min/scenario in
    # the happy path; 25 leaves slack for cold caches.
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        scenario: ${{ fromJSON(needs.gate.outputs.scenarios) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # Wall-clock anchor for the "Append timing summary" step at the end
      # of this job. We stash a Unix timestamp because each ``run:`` block
      # spawns a new shell — ``$SECONDS`` resets per step, so the naive
      # ``$((SECONDS / 60))m`` would always print 0s.
      - name: Capture job start time
        run: echo "JOB_START_S=$(date +%s)" >> "$GITHUB_ENV"
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          enable-cache: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
      - name: Install rustup stable
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      # Generated projects' post_generate.py runs `git init && git commit`
      # to seed an initial commit; without a configured identity the
      # commit fails with "empty ident name" and floods the log with
      # `[FAIL] git commit` noise (the script swallows it, but the noise
      # masks real failures). Mirror e2e.yml's identity step.
      - name: Configure git identity
        run: |
          git config --global user.email "ci@forge.local"
          git config --global user.name "Forge CI"
      - name: Install forge
        run: uv sync --all-extras --dev
      # FORGE_MATRIX_LOG_DIR opts the smoke runner into writing compose
      # logs + ps to a known directory BEFORE it tears the stack down
      # (see tests/matrix/runner.py::_dump_compose_diagnostics). Without
      # this env var, the runner cleans up its tmpdirs and post-job log
      # capture would race against teardown. Mirrors ci.yml's
      # matrix-smoke-fast job pattern.
      - name: Run lane C (smoke) for ${{ matrix.scenario }}
        env:
          FORGE_MATRIX_LOG_DIR: ${{ github.workspace }}/compose-logs
        run: uv run python tests/matrix/runner.py --scenario ${{ matrix.scenario }} --lane smoke
      - name: Upload per-scenario JSON status artifact
        # Each smoke job emits a one-row JSON file; the aggregator job
        # below stitches them into the final dashboard. Using artifacts
        # avoids a fan-in via git, which would require a serialized
        # commit step that conflicts across parallel runners.
        if: always()
        run: |
          mkdir -p matrix-status
          uv run python tests/matrix/runner.py \
            --scenario ${{ matrix.scenario }} --lane smoke --json > \
            matrix-status/${{ matrix.scenario }}.json || true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: matrix-status-${{ matrix.scenario }}
          path: matrix-status/
          if-no-files-found: ignore
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: compose-logs-${{ matrix.scenario }}
          path: compose-logs/
          if-no-files-found: ignore
      - name: Append timing summary
        if: always()
        run: |
          dur=$(( $(date +%s) - ${JOB_START_S:-$(date +%s)} ))
          echo "### Timings — ${{ matrix.scenario }} (smoke)" >> "$GITHUB_STEP_SUMMARY"
          echo "Duration: $((dur / 60))m $((dur % 60))s" >> "$GITHUB_STEP_SUMMARY"

  # Lane D — round-trip CI gate (Phase 5). Generates each opted-in
  # scenario twice with a harvest/apply-back cycle in between and asserts
  # the directory match (FR1 invariant + full forward→reverse→forward
  # round-trip). Each scenario runs ~2 min so the nightly wall-clock
  # stays bounded even with a half-dozen opted-in scenarios.
  roundtrip:
    needs: gate
    if: needs.gate.outputs.roundtrip_scenarios != '[]'
    runs-on: ubuntu-latest
    # Round-trip is pure-Python (two generates + harvest + apply-back).
    # ~2 min/scenario in the happy path; 15 caps any hang at a tolerable
    # 4 runner-hours-vs-the-prior-36 (6 scenarios × 6h default timeout).
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        scenario: ${{ fromJSON(needs.gate.outputs.roundtrip_scenarios) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Capture job start time
        run: echo "JOB_START_S=$(date +%s)" >> "$GITHUB_ENV"
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          enable-cache: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
      - name: Install rustup stable
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      # See smoke job's note — round-trip also exercises generate(),
      # which runs the template's post_generate.py.
      - name: Configure git identity
        run: |
          git config --global user.email "ci@forge.local"
          git config --global user.name "Forge CI"
      - name: Install forge
        run: uv sync --all-extras --dev
      - name: Run lane D (roundtrip) for ${{ matrix.scenario }}
        run: uv run python tests/matrix/runner.py --scenario ${{ matrix.scenario }} --lane roundtrip
      - name: Upload per-scenario JSON status artifact
        if: always()
        run: |
          mkdir -p matrix-status
          uv run python tests/matrix/runner.py \
            --scenario ${{ matrix.scenario }} --lane roundtrip --json > \
            matrix-status/${{ matrix.scenario }}-roundtrip.json || true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: matrix-status-roundtrip-${{ matrix.scenario }}
          path: matrix-status/
          if-no-files-found: ignore
      - name: Append timing summary
        if: always()
        run: |
          dur=$(( $(date +%s) - ${JOB_START_S:-$(date +%s)} ))
          echo "### Timings — ${{ matrix.scenario }} (roundtrip)" >> "$GITHUB_STEP_SUMMARY"
          echo "Duration: $((dur / 60))m $((dur % 60))s" >> "$GITHUB_STEP_SUMMARY"

  # Lane E — forge --update + --harvest CLI e2e (WS4). For every
  # scenario, shells out to ``python -m forge --update --mode
  # {merge,skip,overwrite}`` against an edited fragment-authored file
  # plus a single ``forge --harvest --harvest-out=-`` JSON probe.
  # Complements lane D (which uses the Python API directly): lane E
  # exercises the argparse / builder / dispatcher path real users hit.
  # Per-scenario wall-clock ~2-4 min on cold caches (two generates,
  # three updates with potential uv sync, one harvest).
  update:
    needs: gate
    if: needs.gate.outputs.update_scenarios != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        scenario: ${{ fromJSON(needs.gate.outputs.update_scenarios) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Capture job start time
        run: echo "JOB_START_S=$(date +%s)" >> "$GITHUB_ENV"
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          enable-cache: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
      - name: Install rustup stable
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      # Lane E generate()s twice and runs ``forge --update`` three
      # times; the template's post_generate.py executes ``git init &&
      # git commit`` each time, which fails noisily without an identity.
      - name: Configure git identity
        run: |
          git config --global user.email "ci@forge.local"
          git config --global user.name "Forge CI"
      - name: Install forge
        run: uv sync --all-extras --dev
      - name: Run lane E (update + harvest) for ${{ matrix.scenario }}
        run: uv run python tests/matrix/runner.py --scenario ${{ matrix.scenario }} --lane update
      - name: Upload per-scenario JSON status artifact
        if: always()
        run: |
          mkdir -p matrix-status
          uv run python tests/matrix/runner.py \
            --scenario ${{ matrix.scenario }} --lane update --json > \
            matrix-status/${{ matrix.scenario }}-update.json || true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: matrix-status-update-${{ matrix.scenario }}
          path: matrix-status/
          if-no-files-found: ignore
      - name: Append timing summary
        if: always()
        run: |
          dur=$(( $(date +%s) - ${JOB_START_S:-$(date +%s)} ))
          echo "### Timings — ${{ matrix.scenario }} (update)" >> "$GITHUB_STEP_SUMMARY"
          echo "Duration: $((dur / 60))m $((dur % 60))s" >> "$GITHUB_STEP_SUMMARY"

  # Aggregate per-scenario JSON artifacts into a single markdown grid
  # and publish it to the workflow summary page (no auto-commit to the
  # repo). Runs after every scenario has finished (success or failure)
  # so a partial dashboard is still posted. Maintainers update
  # ``docs/matrix-status.md`` manually if they want to lock a specific
  # snapshot.
  publish-dashboard:
    needs: [smoke, roundtrip, update]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          enable-cache: true
      - name: Install
        run: uv sync --all-extras --dev
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: matrix-status-raw
          pattern: matrix-status-*
          merge-multiple: true
        # If every lane was cancelled (or label-filtered to zero
        # scenarios), no ``matrix-status-*`` artefacts exist and v4 of
        # download-artifact treats that as an error. Tolerate it so the
        # render step below can emit an explicit "no lanes ran" summary
        # instead of failing the publish-dashboard job opaquely.
        continue-on-error: true
      - name: Render markdown grid to job summary
        run: |
          uv run python - <<'PY'
          import json, os
          from pathlib import Path
          from tests.matrix.runner import load_scenarios, _format_markdown_grid, LaneResult
          raw_dir = Path("matrix-status-raw")
          scenarios = load_scenarios()
          # Honest empty-state guard: if no lane wrote a status artefact,
          # don't render a deceptive empty grid — emit a clear notice so
          # the nightly summary reflects what actually happened.
          status_files = list(raw_dir.glob("*.json")) if raw_dir.is_dir() else []
          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          if not status_files:
              with summary.open("a", encoding="utf-8") as fh:
                  fh.write(
                      "## Matrix nightly — no lanes ran\n\n"
                      "No ``matrix-status-*`` artefacts were found. Every "
                      "lane was either cancelled, filtered out by the gate "
                      "step, or failed before its dump step ran. Check the "
                      "individual job logs above for the trigger.\n"
                  )
              Path("matrix-status.md").write_text(
                  "matrix-nightly: no lanes ran (no status artefacts)\n",
                  encoding="utf-8",
              )
          else:
              results = []
              for f in status_files:
                  try:
                      rows = json.loads(f.read_text())
                  except json.JSONDecodeError:
                      continue
                  for row in rows:
                      results.append(LaneResult(
                          scenario=row["scenario"],
                          lane=row["lane"],
                          status=row["status"],
                          duration_ms=int(row.get("duration_ms") or 0),
                          details=row.get("details") or "",
                          missing_files=list(row.get("missing_files") or []),
                      ))
              grid = _format_markdown_grid(results, scenarios)
              with summary.open("a", encoding="utf-8") as fh:
                  fh.write(
                      "## Matrix nightly — lane C (smoke) + lane D (round-trip) "
                      "+ lane E (update + harvest)\n\n"
                  )
                  fh.write(grid)
                  fh.write("\nSee individual scenario logs above for details.\n")
              Path("matrix-status.md").write_text(grid, encoding="utf-8")
          PY
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: matrix-status-grid
          path: matrix-status.md
