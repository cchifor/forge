name: Matrix nightly (lane C smoke + lane D roundtrip)

# Runs nightly heavyweight matrix lanes:
#
# * Lane C — RFC-006 HTTP smoke contract. Each scenario spins up its own
#   docker-compose stack, hits the contract endpoints, and tears down.
#   Excluded from PR runs because per-scenario wall-clock runs ~10 min
#   (Docker pull + compose up + tests + teardown).
# * Lane D — bidirectional-sync round-trip (Phase 5). Each opted-in
#   scenario generates twice (project-a + project-b) with a harvest /
#   apply-back cycle in between; ~2 min/scenario. Exercises the FR1
#   invariant (fresh-generate emits zero block/files candidates) and
#   stages a synthetic block edit when the scenario surface allows.
#
# Also triggerable manually (workflow_dispatch) or when a PR is labeled
# ``ci:matrix-smoke`` so contributors can exercise these lanes on
# demand for changes that touch fragment templates, docker-compose
# rendering, or the harvest / apply-back substrate.

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC nightly
  workflow_dispatch:
  pull_request:
    types: [labeled]

concurrency:
  group: matrix-nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gate the label-triggered variant so random labels don't fire this.
  gate:
    if: >-
      github.event_name != 'pull_request' ||
      github.event.label.name == 'ci:matrix-smoke'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      scenarios: ${{ steps.load.outputs.scenarios }}
      roundtrip_scenarios: ${{ steps.load.outputs.roundtrip_scenarios }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install
        run: uv sync --all-extras --dev
      - id: load
        name: Emit scenario lists as JSON
        run: |
          uv run python -c '
          import json, yaml
          data = yaml.safe_load(open("tests/matrix/scenarios.yaml"))
          # Lane C — scenarios opted into ``smoke``.
          smoke_names = [s["name"] for s in data["scenarios"] if "smoke" in s.get("lanes", [])]
          # Lane D — scenarios opted into ``roundtrip`` (Phase 5).
          roundtrip_names = [
              s["name"] for s in data["scenarios"] if "roundtrip" in s.get("lanes", [])
          ]
          print(f"scenarios={json.dumps(smoke_names)}")
          print(f"roundtrip_scenarios={json.dumps(roundtrip_names)}")
          ' >> "$GITHUB_OUTPUT"

  smoke:
    needs: gate
    runs-on: ubuntu-latest
    # Cap individual smoke scenarios — a hung docker compose stack will
    # otherwise idle for github's 6-hour default. ~10 min/scenario in
    # the happy path; 25 leaves slack for cold caches.
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        scenario: ${{ fromJSON(needs.gate.outputs.scenarios) }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install rustup stable
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      # Generated projects' post_generate.py runs `git init && git commit`
      # to seed an initial commit; without a configured identity the
      # commit fails with "empty ident name" and floods the log with
      # `[FAIL] git commit` noise (the script swallows it, but the noise
      # masks real failures). Mirror e2e.yml's identity step.
      - name: Configure git identity
        run: |
          git config --global user.email "ci@forge.local"
          git config --global user.name "Forge CI"
      - name: Install forge
        run: uv sync --all-extras --dev
      - name: Run lane C (smoke) for ${{ matrix.scenario }}
        run: uv run python tests/matrix/runner.py --scenario ${{ matrix.scenario }} --lane smoke
      - name: Upload per-scenario JSON status artifact
        # Each smoke job emits a one-row JSON file; the aggregator job
        # below stitches them into the final dashboard. Using artifacts
        # avoids a fan-in via git, which would require a serialized
        # commit step that conflicts across parallel runners.
        if: always()
        run: |
          mkdir -p matrix-status
          uv run python tests/matrix/runner.py \
            --scenario ${{ matrix.scenario }} --lane smoke --json > \
            matrix-status/${{ matrix.scenario }}.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: matrix-status-${{ matrix.scenario }}
          path: matrix-status/
          if-no-files-found: ignore
      - name: Dump docker compose logs on failure
        if: failure()
        run: |
          for f in /tmp/forge-matrix-*/${{ matrix.scenario }}*/docker-compose.yml; do
            if [ -f "$f" ]; then
              echo "=== docker compose logs for $f ==="
              docker compose -f "$f" logs --tail 200 || true
              docker compose -f "$f" down -v --remove-orphans || true
            fi
          done

  # Lane D — round-trip CI gate (Phase 5). Generates each opted-in
  # scenario twice with a harvest/apply-back cycle in between and asserts
  # the directory match (FR1 invariant + full forward→reverse→forward
  # round-trip). Each scenario runs ~2 min so the nightly wall-clock
  # stays bounded even with a half-dozen opted-in scenarios.
  roundtrip:
    needs: gate
    if: needs.gate.outputs.roundtrip_scenarios != '[]'
    runs-on: ubuntu-latest
    # Round-trip is pure-Python (two generates + harvest + apply-back).
    # ~2 min/scenario in the happy path; 15 caps any hang at a tolerable
    # 4 runner-hours-vs-the-prior-36 (6 scenarios × 6h default timeout).
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        scenario: ${{ fromJSON(needs.gate.outputs.roundtrip_scenarios) }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install rustup stable
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      # See smoke job's note — round-trip also exercises generate(),
      # which runs the template's post_generate.py.
      - name: Configure git identity
        run: |
          git config --global user.email "ci@forge.local"
          git config --global user.name "Forge CI"
      - name: Install forge
        run: uv sync --all-extras --dev
      - name: Run lane D (roundtrip) for ${{ matrix.scenario }}
        run: uv run python tests/matrix/runner.py --scenario ${{ matrix.scenario }} --lane roundtrip
      - name: Upload per-scenario JSON status artifact
        if: always()
        run: |
          mkdir -p matrix-status
          uv run python tests/matrix/runner.py \
            --scenario ${{ matrix.scenario }} --lane roundtrip --json > \
            matrix-status/${{ matrix.scenario }}-roundtrip.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: matrix-status-roundtrip-${{ matrix.scenario }}
          path: matrix-status/
          if-no-files-found: ignore

  # Aggregate per-scenario JSON artifacts into a single markdown grid
  # and publish it to the workflow summary page (no auto-commit to the
  # repo). Runs after every scenario has finished (success or failure)
  # so a partial dashboard is still posted. Maintainers update
  # ``docs/matrix-status.md`` manually if they want to lock a specific
  # snapshot.
  publish-dashboard:
    needs: [smoke, roundtrip]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install
        run: uv sync --all-extras --dev
      - uses: actions/download-artifact@v4
        with:
          path: matrix-status-raw
          pattern: matrix-status-*
          merge-multiple: true
      - name: Render markdown grid to job summary
        run: |
          uv run python - <<'PY'
          import json, os
          from pathlib import Path
          from tests.matrix.runner import load_scenarios, _format_markdown_grid, LaneResult
          raw_dir = Path("matrix-status-raw")
          scenarios = load_scenarios()
          results = []
          for f in raw_dir.glob("*.json"):
              try:
                  rows = json.loads(f.read_text())
              except json.JSONDecodeError:
                  continue
              for row in rows:
                  results.append(LaneResult(
                      scenario=row["scenario"],
                      lane=row["lane"],
                      status=row["status"],
                      duration_ms=int(row.get("duration_ms") or 0),
                      details=row.get("details") or "",
                      missing_files=list(row.get("missing_files") or []),
                  ))
          grid = _format_markdown_grid(results, scenarios)
          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with summary.open("a", encoding="utf-8") as fh:
              fh.write("## Matrix nightly — lane C (smoke) + lane D (round-trip)\n\n")
              fh.write(grid)
              fh.write("\nSee individual scenario logs above for details.\n")
          Path("matrix-status.md").write_text(grid, encoding="utf-8")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: matrix-status-grid
          path: matrix-status.md
