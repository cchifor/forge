name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Install
        run: uv sync --all-extras --dev
      - name: ruff check
        run: uv run ruff check forge/
      - name: ruff format --check
        run: uv run ruff format --check forge/

  # Epic X (1.1.0-alpha.1) — typecheck split into forge + canary. A
  # failure in `typecheck-forge` alone is a forge typing regression. A
  # failure in `typecheck-ty-canary` alone is an upstream ty regression
  # that requires bumping the pin in pyproject.toml via the
  # `ty-upgrade` workflow. If both fail, investigate the canary first
  # — the forge errors are probably secondary.
  typecheck-forge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Install
        run: uv sync --all-extras --dev
      - name: ty check forge/
        run: uv run ty check forge/

  typecheck-ty-canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Install
        run: uv sync --all-extras --dev
      - name: ty canary (detect upstream ty regressions)
        run: uv run pytest tests/test_ty_canary.py -v --no-cov

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        # Forge declares ``requires-python = ">=3.13"`` — testing earlier
        # versions would catch regressions we don't owe downstream users.
        # Single-version matrix preserves the ubuntu+windows split.
        python: ["3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Set Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}
      - name: Install
        run: uv sync --all-extras --dev
      - name: pytest
        # Epic DD carves package_integrity into its own job below; exclude it
        # from the main matrix so the wall-clock stays flat.
        # golden_snapshot tests are deterministic across OS+Python (the
        # generator is the same Python code on every cell), so they ship
        # only on the single coverage cell — saves ~5 min per matrix cell
        # ×5 redundant cells = ~25 min CI compute per push.
        # `-n auto` parallelises within the cell using pytest-xdist; the
        # GitHub-Actions linux runner is 2-core so this typically halves
        # the cell wall-clock.
        # PYTHONIOENCODING=utf-8 protects the Windows cell from xdist
        # workers dying when pytest emits non-ASCII (em-dash, …) via
        # stdout/stderr — the locale default cp1252 cannot encode the
        # banner characters our codegen + docstrings already use.
        env:
          PYTHONIOENCODING: "utf-8"
        run: uv run pytest -m "not e2e and not package_integrity and not fuzz and not golden_snapshot" -n auto

  # Epic S (1.1.0-alpha.1) — coverage gate. Two layers:
  #   1. `pyproject.toml`'s `fail_under = 75` catches project-wide regressions.
  #   2. `tests/test_coverage_gates.py` enforces per-module floors for the
  #      critical path (resolver, appliers/*, sync/{merge,provenance},
  #      AST injectors, sync/forge_to_project/updater/* — post-Epic-A
  #      decomposition of the legacy `feature_injector` + `updater` modules).
  #      See docs/coverage-policy.md.
  # Runs on ubuntu × 3.13 only — this is a gate, not a matrix, and the
  # test_coverage_gates tests parametrize over platform-agnostic path keys.
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Set Python 3.13
        run: uv python install 3.13
      - name: Install
        run: uv sync --all-extras --dev
      - name: pytest --cov --cov-report=xml,json
        # `-n auto` parallelises within the coverage cell. pytest-cov
        # is xdist-aware so per-worker reports merge cleanly into one
        # coverage.json before the floor gate runs.
        run: |
          uv run pytest -m "not e2e and not package_integrity and not fuzz" -n auto \
            --cov=forge \
            --cov-report=xml:coverage.xml \
            --cov-report=json:coverage.json \
            --cov-report=term
      - name: Per-module floor gate
        # Re-runs the gate tests against the fresh coverage.json so the CI
        # failure surfaces *which* module dropped rather than just "coverage
        # low". pytest exits non-zero when any parametrized case fails.
        run: uv run pytest tests/test_coverage_gates.py -v --no-cov
      - name: Refresh coverage badge
        # Epic S — keeps docs/coverage-policy.md's header and
        # .forge-coverage.json in sync with the actual measured coverage.
        # Stops stale numbers (like the stale "21%" this epic opened with)
        # from lingering in docs after coverage improves.
        run: uv run python scripts/coverage_badge.py
      - name: Upload coverage to Codecov
        # Public repo: Codecov's OIDC flow uploads without a token. If we
        # switch to a private repo later, set CODECOV_TOKEN in repo secrets
        # and the same action picks it up automatically. `fail_ci_if_error`
        # stays false so a Codecov outage doesn't block a PR on the real
        # pytest + gate signal.
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # Epic DD (1.1.0-alpha.1) — package integrity. Build the sdist + wheel
  # via `uv build`, inspect both archives, assert every sentinel template
  # file is present and no cache/build clutter leaked in. Own job because
  # the build adds ~30s; keeping it out of the main matrix preserves the
  # per-PR wall-clock. See tests/test_package_integrity.py for the
  # sentinel list + contaminant whitelist.
  package-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Set Python 3.13
        run: uv python install 3.13
      - name: Install
        run: uv sync --all-extras --dev
      - name: pytest -m package_integrity
        run: uv run pytest -m package_integrity -v --no-cov

  # Epic S (1.1.0-alpha.1) — config-matrix validation (lane A: generate).
  # `matrix-setup` reads tests/matrix/scenarios.yaml and emits the scenario
  # list as a GitHub Actions matrix so each scenario runs on its own runner.
  # Parallelism means wall-clock is bounded by the slowest scenario (~1min
  # for lane A) rather than the sum. Lanes B and C arrive in sprint 2.
  matrix-setup:
    runs-on: ubuntu-latest
    outputs:
      scenarios: ${{ steps.load.outputs.scenarios }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Install
        run: uv sync --all-extras --dev
      - name: Validate scenarios.yaml schema
        # Front-load schema validation so malformed YAML fails this step
        # with a useful diagnostic rather than the inline-Python emit
        # step below silently propagating empty / wrong matrix lists.
        # Reuses tests/matrix/test_scenarios_schema.py so the workflow
        # and test suite agree on what counts as a valid scenario.
        run: uv run pytest tests/matrix/test_scenarios_schema.py -v --no-cov
      - id: load
        name: Emit scenario list as JSON
        # ``yq`` isn't on the default runner image; use the Python parser
        # we already depend on (pyyaml) to keep the dependency surface
        # minimal. The printed JSON populates the downstream strategy
        # matrix via ``fromJSON``.
        run: |
          uv run python -c '
          import json, yaml
          data = yaml.safe_load(open("tests/matrix/scenarios.yaml"))
          names = [s["name"] for s in data["scenarios"]]
          print(f"scenarios={json.dumps(names)}")
          ' >> "$GITHUB_OUTPUT"

  matrix-generate:
    needs: matrix-setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario: ${{ fromJSON(needs.matrix-setup.outputs.scenarios) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Install
        run: uv sync --all-extras --dev
      - name: Run lane A (generate) for ${{ matrix.scenario }}
        run: uv run python tests/matrix/runner.py --scenario ${{ matrix.scenario }} --lane generate

  # Lane B — toolchain verify. Runs per-scenario in parallel. Each
  # scenario's config may depend on a different backend toolchain (uv,
  # node/npm, cargo), so we preinstall all three before dispatching.
  matrix-verify:
    needs: matrix-setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario: ${{ fromJSON(needs.matrix-setup.outputs.scenarios) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Install rustup stable
        # The setup-rust actions add churn; one-liner is stable + cached
        # implicitly by the runner image on ubuntu-latest.
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      # Generated projects' post_generate.py runs `git init && git commit` to
      # seed an initial commit; without a configured identity that fails with
      # "fatal: empty ident name not allowed" and the verify lane's toolchain
      # build aborts. matrix-generate / matrix-smoke-fast already configure
      # this — matrix-verify was missing it, so the rust verify scenarios
      # flaked depending on the runner's ambient git config.
      - name: Configure git identity
        run: |
          git config --global user.email "ci@forge.local"
          git config --global user.name "Forge CI"
      - name: Install forge
        run: uv sync --all-extras --dev
      - name: Run lane B (verify) for ${{ matrix.scenario }}
        run: uv run python tests/matrix/runner.py --scenario ${{ matrix.scenario }} --lane verify

  # WS-8.1 — CVE scanning as a BLOCKING gate. High/critical vulnerabilities
  # fail CI rather than being advisory-only. Python deps via pip-audit (exits
  # non-zero on any advisory), Node workspace packages via npm audit at the
  # high severity threshold.
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install project deps
        run: uv sync --all-extras --dev

      - name: pip-audit (Python)
        run: |
          uv export --no-hashes --frozen > /tmp/requirements.txt
          uvx pip-audit -r /tmp/requirements.txt

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: npm audit (Node workspace packages)
        run: |
          set -euo pipefail
          for pkg in packages/canvas-core packages/canvas-vue packages/canvas-svelte; do
            echo "::group::npm audit — $pkg"
            (cd "$pkg" && npm install --package-lock-only && npm audit --audit-level=high)
            echo "::endgroup::"
          done

  # WS3 — fast smoke subset on every PR. Lane C (docker compose up +
  # RFC-006 HTTP contract) otherwise runs only nightly via
  # matrix-nightly.yml, which means the median PR ships with no compose
  # signal at all. This job exercises the two fastest smoke-eligible
  # scenarios (py_svelte_min + node_svelte_min) so compose drift and
  # health-check regressions surface before they land on main. The full
  # 11-scenario smoke set stays in matrix-nightly.yml — see WS3 in
  # docs/superpowers/plans/immutable-napping-bear.md for the rationale.
  matrix-smoke-fast:
    needs: matrix-setup
    runs-on: ubuntu-latest
    # Smoke is ~10 min/scenario (Docker pull + compose up + tests +
    # teardown). 20 min cap leaves slack for cold caches without
    # blocking a runner for hours on a hung compose stack.
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # The two fastest smoke-opted-in scenarios from
        # tests/matrix/scenarios.yaml — both are min-config single-
        # backend stacks (no Keycloak, no options) which keeps the PR
        # critical path bounded. Do not fan out to the full smoke set
        # here; that's nightly's job.
        scenario: [py_svelte_min, node_svelte_min]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      # Generated projects' post_generate.py runs `git init && git commit`
      # to seed an initial commit; without a configured identity the
      # commit fails with "empty ident name" and floods the log with
      # `[FAIL] git commit` noise (the script swallows it, but the noise
      # masks real failures). Mirror matrix-nightly.yml's identity step.
      - name: Configure git identity
        run: |
          git config --global user.email "ci@forge.local"
          git config --global user.name "Forge CI"
      - name: Install forge
        run: uv sync --all-extras --dev
      # FORGE_MATRIX_LOG_DIR opts the smoke runner into writing compose
      # logs + ps to a known directory BEFORE it tears the stack down
      # (see tests/matrix/runner.py::_dump_compose_diagnostics). Without
      # this env var, the runner cleans up its tmpdirs and post-job log
      # capture would race against teardown.
      - name: Run lane C (smoke) for ${{ matrix.scenario }}
        env:
          FORGE_MATRIX_LOG_DIR: ${{ github.workspace }}/compose-logs
        run: uv run python tests/matrix/runner.py --scenario ${{ matrix.scenario }} --lane smoke
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: compose-logs-${{ matrix.scenario }}
          path: compose-logs/
          if-no-files-found: ignore

  # WS-9.1 — wire the previously-dormant quality gates so they actually run
  # on every PR instead of being advertised-but-never-executed:
  #   * auth-SDK cross-language parity contract (tests/contract/auth_sdk_parity)
  #   * the fuzz suite (excluded from the main test lane via `-m "not fuzz"`)
  #   * codegen-drift: docs/FEATURES.md must match the generator's output
  quality-gates:
    name: Quality gates (parity / fuzz / codegen-drift)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      # Node + Rust toolchains so the cross-language auth-SDK parity contract
      # actually exercises the Node/Rust runners instead of self-skipping when
      # their toolchains are absent.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # pinned stable

      - name: Install forge + parity deps
        run: uv sync --all-extras --dev

      - name: Auth-SDK cross-language parity contract
        run: uv run pytest tests/contract/auth_sdk_parity -q --no-cov -p no:cacheprovider

      - name: Fuzz suite
        run: uv run pytest -m fuzz -q --no-cov -p no:cacheprovider

      - name: Codegen drift — docs/FEATURES.md is up to date
        run: |
          uv run python tools/gen_features_doc.py
          if ! git diff --quiet -- docs/FEATURES.md; then
            echo "::error::docs/FEATURES.md is stale. Run tools/gen_features_doc.py and commit."
            git --no-pager diff -- docs/FEATURES.md
            exit 1
          fi
