name: Plugin E2E

# P0.2 (1.1.0-alpha.2) — gate the public ``forge.api`` plugin contract by
# installing ``examples/forge-plugin-example`` against the working tree
# and running the ``plugin_e2e``-marked tests against the live registry.
# Catches drift between the plugin SDK (forge/api.py) and the reference
# implementation before release. See docs/plugin-development.md for the
# stable-API table.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # Skip the gate on PRs that don't touch the plugin surface — the
    # other CI jobs cover those changes. Listed paths cover the public
    # API, the loader, the registries that plugins write to, the
    # reference plugin itself, and this workflow.
    paths:
      - "forge/api.py"
      - "forge/plugins.py"
      - "forge/options.py"
      - "forge/options/**"
      - "forge/fragments.py"
      - "forge/config/**"
      - "forge/services/**"
      - "forge/generator.py"
      - "forge/variable_mapper.py"
      - "forge/docker_manager.py"
      - "forge/backend_app_templates.py"
      # The updater resolves plugin backends/frontends during `forge --update`
      # (test_plugin_e2e.py exercises that cycle); without this, a PR that only
      # touches updater logic would skip the plugin-e2e gate.
      - "forge/sync/forge_to_project/updater/**"
      - "forge/cli/**"
      - "examples/forge-plugin-example/**"
      - "examples/forge-go-backend/**"
      - "examples/forge-vite-frontend/**"
      - "tests/test_plugin_e2e.py"
      - "tests/test_plugin_backend_go.py"
      - "tests/test_plugin_frontend_vite.py"
      - ".github/workflows/plugin-e2e.yml"
      - "pyproject.toml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plugin-e2e:
    runs-on: ubuntu-latest
    # uv sync + editable plugin install + a single test marker takes
    # well under five minutes in steady state; cap at 20 to absorb cold
    # caches or transient network delays without burning the default
    # 6-hour ceiling.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Set Python 3.13
        run: uv python install 3.13
      - name: Install forge
        run: uv sync --all-extras --dev
      - name: Install reference plugins into the same venv
        # Editable installs so a plugin-side bug surfaces against the
        # branch's plugin source, not a published package. Both depend on
        # forge>=1.0.0a1; the dev sync above already provides the
        # working-tree forge so they resolve locally. forge-go-backend
        # registers a new backend LANGUAGE (the add_backend SDK surface).
        run: |
          uv pip install -e examples/forge-plugin-example
          uv pip install -e examples/forge-go-backend
          uv pip install -e examples/forge-vite-frontend
      - name: Set up Go (for the generated Go backend's compile check)
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.22"
      - name: Set up Node (for the generated Vite frontend's build check)
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "22"
      - name: pytest -m plugin_e2e
        run: uv run pytest -m plugin_e2e -v --no-cov
      # These suites are import-path based (no pip install needed) and aren't
      # ``plugin_e2e``-marked, so run them explicitly — this lane has Go + Node
      # on PATH, so the compile/build assertions actually exercise ``go build``
      # / ``npm run build`` rather than skipping.
      - name: pytest go-backend + vite-frontend e2e
        run: uv run pytest tests/test_plugin_backend_go.py tests/test_plugin_frontend_vite.py -v --no-cov
