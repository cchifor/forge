name: Release

# Triggered on tag push matching v*.*.* (including pre-release identifiers).
# Publishes every package in lockstep order: PyPI first (forge CLI, since
# fragment rollout hinges on it), then npm scopes, then pub.dev. Any
# failure halts the pipeline and surfaces which registry failed.

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'   # pre-release identifiers (alpha, beta, rc)

# Per-tag concurrency group — protects against re-triggering THE SAME
# tag while one of its publish jobs is mid-flight (eg. someone pushes
# v1.2.0 twice). GitHub Actions concurrency cannot truly serialise
# different tags: a workflow-level group (`release-publish`) with
# `cancel-in-progress: false` would actually *cancel* older pending
# runs when a newer one is queued (per the GHA docs: only the running
# run is preserved, every other run in the same group is purged when a
# new one arrives). Per-tag grouping lets v1.2.0 and v1.2.1 publish in
# parallel — registries (PyPI / npm / pub.dev) tolerate concurrent
# distinct-version uploads, so this is the safer trade-off than
# silently dropping a queued release.
concurrency:
  group: release-publish-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Epic Z (1.1.0-alpha.1) — release rehearsal gate. Queries the
  # `release-dryrun/ok` check-run on the tagged commit's SHA and
  # fails fast unless a successful dry-run completed within 72h.
  # Every publish-* job depends on this, so a broken build, an
  # npm publish misconfiguration, or a malformed CHANGELOG section
  # gets caught in the separate `release-dryrun.yml` workflow before
  # we ever touch PyPI / npm / pub.dev.
  #
  # Escape hatch: repo variable SKIP_DRYRUN_GATE=true short-circuits
  # the check (auditable — variable mutations are in the repo log).
  # Use sparingly; the gate exists to save you from yourself.
  preflight-dryrun:
    name: Preflight — release-dryrun/ok within 72h
    runs-on: ubuntu-latest
    permissions:
      checks: read
    steps:
      - name: Check for a recent release-dryrun/ok
        if: vars.SKIP_DRYRUN_GATE != 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const sha = context.sha;
            const resp = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
              check_name: "release-dryrun/ok",
            });
            const cutoffMs = 72 * 60 * 60 * 1000;
            const now = Date.now();
            const recent = resp.data.check_runs.find((r) => {
              if (r.conclusion !== "success") return false;
              const t = r.completed_at ? new Date(r.completed_at).getTime() : 0;
              return (now - t) < cutoffMs;
            });
            if (!recent) {
              core.setFailed([
                `No successful release-dryrun/ok check-run for ${sha} within 72h.`,
                "",
                "Fix: run the 'Release dry-run' workflow against this commit",
                "(Actions → Release dry-run → Run workflow), wait for green,",
                "then re-push the tag. See RELEASING.md 'Pre-release dry-run protocol'.",
                "",
                "Escape hatch: set repo variable SKIP_DRYRUN_GATE=true (auditable).",
              ].join("\n"));
              return;
            }
            core.notice(`release-dryrun/ok from ${recent.completed_at} — gate cleared.`);

      - name: Skip-gate escape hatch active
        if: vars.SKIP_DRYRUN_GATE == 'true'
        run: |
          echo "::warning::SKIP_DRYRUN_GATE=true — release dry-run gate bypassed."
          echo "Consider re-enabling after this release."

  publish-pypi:
    name: Publish forge (PyPI)
    needs: preflight-dryrun
    runs-on: ubuntu-latest
    environment: release
    permissions:
      # Trusted publishing via OIDC — no API token required.
      # https://docs.pypi.org/trusted-publishers/
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          enable-cache: true

      - name: Build sdist + wheel
        run: uv build

      - name: Publish to TestPyPI (pre-release)
        if: contains(github.ref_name, '-')
        env:
          UV_PUBLISH_URL: https://test.pypi.org/legacy/
        run: uv publish

      - name: Publish to PyPI (stable)
        if: "!contains(github.ref_name, '-')"
        run: uv publish

  publish-npm-canvas-vue:
    name: Publish @forge/canvas-vue
    needs: publish-pypi
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install + build
        working-directory: packages/canvas-vue
        run: |
          npm ci
          npm run build

      - name: Publish (alpha tag)
        if: contains(github.ref_name, 'alpha')
        working-directory: packages/canvas-vue
        run: npm publish --tag alpha --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      - name: Publish (beta tag)
        if: contains(github.ref_name, 'beta')
        working-directory: packages/canvas-vue
        run: npm publish --tag beta --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      - name: Publish (latest)
        if: "!contains(github.ref_name, '-')"
        working-directory: packages/canvas-vue
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

  publish-npm-canvas-svelte:
    name: Publish @forge/canvas-svelte
    needs: publish-pypi
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install + build
        working-directory: packages/canvas-svelte
        run: |
          npm ci
          npm run build

      - name: Publish (alpha tag)
        if: contains(github.ref_name, 'alpha')
        working-directory: packages/canvas-svelte
        run: npm publish --tag alpha --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      - name: Publish (latest)
        if: "!contains(github.ref_name, '-')"
        working-directory: packages/canvas-svelte
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

  publish-pub-dev-core:
    name: Publish forge_canvas_core (pub.dev)
    # Must run BEFORE publish-pub-dev: forge_canvas declares
    # `forge_canvas_core: ^1.0.0-alpha.1` as a runtime dep, and pub.dev
    # strips `dependency_overrides` at publish time so the in-tree
    # `path:` override won't help downstream consumers. publish-pub-dev
    # validates the resolved dep graph and would 4xx if core isn't on
    # the registry yet.
    needs: publish-pypi
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Dart-only — no Flutter toolchain needed. forge_canvas_core has
      # no Flutter dep (that's the entire point of the Phase 2B split);
      # using `setup-dart` keeps the publish image small + matches the
      # package's actual sdk constraint (`>=3.0.0 <4.0.0`).
      - name: Setup Dart
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable

      - name: Configure pub.dev credentials
        working-directory: packages/forge-canvas-core-dart
        run: |
          mkdir -p ~/.config/dart
          echo "${{ secrets.PUB_DEV_CREDENTIALS }}" > ~/.config/dart/pub-credentials.json

      - name: Analyze
        working-directory: packages/forge-canvas-core-dart
        run: |
          dart pub get
          dart analyze

      - name: Test
        working-directory: packages/forge-canvas-core-dart
        run: dart test

      - name: Publish
        working-directory: packages/forge-canvas-core-dart
        run: dart pub publish --force

  publish-pub-dev:
    name: Publish forge_canvas (pub.dev)
    # Depend on -core so the publishes serialize correctly: pub.dev
    # resolves forge_canvas's `forge_canvas_core: ^X.Y.Z` dep against
    # the registry, not the dependency_overrides path.
    needs: publish-pub-dev-core
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.24.x'

      - name: Configure pub.dev credentials
        working-directory: packages/forge-canvas-dart
        run: |
          mkdir -p ~/.config/dart
          echo "${{ secrets.PUB_DEV_CREDENTIALS }}" > ~/.config/dart/pub-credentials.json

      - name: Analyze
        working-directory: packages/forge-canvas-dart
        run: |
          flutter pub get
          flutter analyze

      - name: Publish
        working-directory: packages/forge-canvas-dart
        run: flutter pub publish --force

  github-release:
    name: Create GitHub release
    needs: [publish-pypi, publish-npm-canvas-vue, publish-npm-canvas-svelte, publish-pub-dev-core, publish-pub-dev]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          enable-cache: true

      - name: Extract changelog section
        id: changelog
        run: |
          version="${{ github.ref_name }}"
          version="${version#v}"
          # Pull the dated section matching this version out of CHANGELOG.md
          awk -v v="$version" '/^## \[/ { in_section=0 } $0 ~ "^## \\[" v "\\]" { in_section=1; next } in_section' CHANGELOG.md > release-notes.md
          cat release-notes.md

      # Task 7 / 3B — CycloneDX SBOM. Generates a machine-readable
      # software bill of materials from the locked dependency graph and
      # attaches it to the GitHub release as a downloadable asset.
      - name: Generate CycloneDX SBOM
        run: |
          uv sync --all-extras --dev
          uvx cyclonedx-bom --format json --output forge-sbom.cdx.json

      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          body_path: release-notes.md
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Attach SBOM to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" forge-sbom.cdx.json --clobber
