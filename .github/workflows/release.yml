name: Release

# Triggered on a version tag push. forge is distributed GitHub-only — there is
# NO package-registry publishing (no PyPI / npm / pub.dev). Users install from
# source via ./install, which runs `uv tool install git+<repo>`. This workflow
# only cuts a GitHub Release carrying the built sdist+wheel, a CycloneDX SBOM,
# and the changelog notes, so every tag has a downloadable, pinned snapshot.

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'   # pre-release identifiers (alpha, beta, rc)

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Fail closed if the tag and the package __version__ disagree, so a tag
      # never cuts a release whose artifacts carry a different version.
      - name: Check tag matches package version
        run: bash .github/scripts/check-tag-version.sh "${{ github.ref_name }}"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Build sdist + wheel
        run: uv build

      - name: Detect prerelease
        id: prerelease
        run: bash .github/scripts/detect-prerelease.sh "${{ github.ref_name }}"

      - name: Extract changelog section
        id: changelog
        run: |
          # Pull the [Unreleased] section body for the release notes; fail if
          # it's empty/missing so a release never ships blank notes.
          bash .github/scripts/extract-changelog.sh Unreleased CHANGELOG.md > release-notes.md
          cat release-notes.md

      # CycloneDX SBOM from the locked dependency graph, attached to the release
      # as a downloadable supply-chain artifact.
      - name: Generate CycloneDX SBOM
        run: |
          uv sync --all-extras --dev
          uvx --from cyclonedx-bom cyclonedx-py environment \
            --output-format json --output-file forge-sbom.cdx.json

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          body_path: release-notes.md
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
          files: |
            dist/*
            forge-sbom.cdx.json
