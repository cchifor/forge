name: Release dry-run

# Epic Z (1.1.0-alpha.1) — pre-release rehearsal.
#
# Exercises every publish path against dry-run endpoints / offline
# validators so we never discover a broken registry auth, bad package
# metadata, or malformed CHANGELOG extraction mid-release. On green,
# writes a `release-dryrun/ok` check-run against the commit SHA that
# `release.yml`'s preflight job consumes — a tagged release within
# 72h of the dry-run proceeds; otherwise it fails fast.
#
# Rehearses: Python sdist+wheel build + metadata, forge CLI install
# smoke, canvas-vue npm dry-run, canvas-svelte npm dry-run,
# forge_canvas pub.dev dry-run, CHANGELOG extraction logic.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit SHA or ref to rehearse (default: workflow source)"
        required: false
        default: ""

permissions:
  contents: read
  # Needed by the terminal job to create the `release-dryrun/ok` check-run.
  checks: write

concurrency:
  # Serialise per ref so two maintainers hitting "Run workflow" at once
  # don't race each other's check-run writes.
  group: release-dryrun-${{ inputs.ref || github.sha }}
  cancel-in-progress: true

jobs:
  build-python:
    name: Build Python sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: uv build
        run: uv build

      - name: twine check (package metadata)
        # Catches the most common publish-blockers: README rendering
        # issues, missing classifier, bad long-description-content-type.
        # Runs offline — no PyPI round trip.
        run: |
          uv tool run --from twine twine check dist/*

      - name: Upload dist/ artefacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/
          retention-days: 1

  install-smoke:
    name: Install smoke (forge --help)
    needs: build-python
    runs-on: ubuntu-latest
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Download dist/ artefacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Install forge from the built wheel
        # `uv tool install` creates an isolated venv and links `forge`
        # into PATH — same shape as an end-user's install.
        run: |
          set -euo pipefail
          wheel=$(ls dist/forge-*.whl | head -1)
          echo "Installing: $wheel"
          uv tool install --from "$wheel" forge

      - name: forge --version
        run: forge --version

      - name: forge --help
        run: forge --help

      - name: forge --list (registry walks cleanly)
        # Exercises the plugin loader + option registry — a corrupt
        # wheel (missing templates/, bad entry point) fails here.
        run: forge --list

  npm-canvas-vue:
    name: npm publish --dry-run (canvas-vue)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org/"

      - name: npm ci + build
        working-directory: packages/canvas-vue
        run: |
          npm ci
          npm run build

      - name: npm publish --dry-run
        working-directory: packages/canvas-vue
        # --dry-run validates the package contents (files, metadata,
        # access mode) without auth or a registry round trip, so this
        # catches bad `files:` globs, missing `main`/`module`, or a
        # public/private access mismatch.
        run: npm publish --dry-run --access public

  npm-canvas-svelte:
    name: npm publish --dry-run (canvas-svelte)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org/"

      - name: npm ci + build
        working-directory: packages/canvas-svelte
        run: |
          npm ci
          npm run build

      - name: npm publish --dry-run
        working-directory: packages/canvas-svelte
        run: npm publish --dry-run --access public

  pub-dev-canvas-dart:
    name: flutter pub publish --dry-run (forge_canvas)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x"

      - name: flutter pub get
        working-directory: packages/forge-canvas-dart
        run: flutter pub get

      - name: flutter analyze
        working-directory: packages/forge-canvas-dart
        run: flutter analyze

      - name: flutter pub publish --dry-run
        working-directory: packages/forge-canvas-dart
        # --dry-run validates pubspec.yaml, file selection, and
        # dependencies without authenticating or mutating pub.dev.
        run: flutter pub publish --dry-run

  changelog-extract:
    name: CHANGELOG extraction validates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Extract most recent dated section
        # Re-runs the exact awk pattern release.yml uses (line 165 of
        # release.yml) against the most recent dated `## [X.Y.Z]`
        # section. A CHANGELOG.md that shipped without its per-version
        # section would produce an empty extract — a release day
        # nightmare we prefer to catch here.
        run: |
          set -euo pipefail
          version=$(grep -oP '^## \[\K\d+\.\d+\.\d+(?:[a-z]+\d+)?' CHANGELOG.md | head -1)
          if [ -z "$version" ]; then
            echo "::error::No dated ## [X.Y.Z] section found in CHANGELOG.md"
            exit 1
          fi
          echo "Most recent dated version section: $version"
          awk -v v="$version" '/^## \[/ { in_section=0 } $0 ~ "^## \\[" v "\\]" { in_section=1; next } in_section' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::Extraction for $version produced empty output"
            exit 1
          fi
          echo "--- First 30 lines ---"
          head -30 release-notes.md

  dryrun-ok:
    # Terminal job — writes the check-run that release.yml's preflight
    # reads. Every prior job must pass; otherwise the release gate
    # stays closed and a maintainer must re-run the dry-run.
    name: Record release-dryrun/ok
    needs:
      - build-python
      - install-smoke
      - npm-canvas-vue
      - npm-canvas-svelte
      - pub-dev-canvas-dart
      - changelog-extract
    runs-on: ubuntu-latest
    permissions:
      checks: write
    steps:
      - name: Create release-dryrun/ok check-run
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.inputs?.ref || context.sha;
            const summary = [
              "All 6 dry-run jobs green:",
              "- Python sdist + wheel built and metadata validated (twine check)",
              "- forge CLI installable from the built wheel (`forge --version / --help / --list`)",
              "- canvas-vue: `npm publish --dry-run` clean",
              "- canvas-svelte: `npm publish --dry-run` clean",
              "- forge_canvas: `flutter pub publish --dry-run` + analyze clean",
              "- CHANGELOG.md section extraction produces non-empty output",
              "",
              `This SHA (\`${sha}\`) is release-eligible for 72h.`,
              "",
              `Workflow run: ${context.payload.repository?.html_url || ''}/actions/runs/${context.runId}`,
            ].join("\n");

            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: "release-dryrun/ok",
              head_sha: sha,
              status: "completed",
              conclusion: "success",
              output: {
                title: "Release dry-run passed",
                summary,
              },
            });

            core.notice(`Wrote release-dryrun/ok check-run on ${sha}. Good for 72h.`);
