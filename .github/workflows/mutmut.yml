name: Mutation testing

# Hybrid strategy (Path B + Path C from RFC discussion).
#
# Why non-gating for the broad lane: even with sharding,
# ``--runner "pytest -x"``, and ``--use-coverage``, individual files in
# this codebase historically overrun any reasonable per-shard budget on
# ``ubuntu-latest``. Treat the broad mutmut lane as advisory tech-debt
# signal, not a merge gate.
#
# Three operating modes:
#   - Pull request, scoped PR-gate (blocking, default on every PR):
#     mutate ONLY the three highest-consequence modules listed in
#     ``tests/mutmut_baselines.json:pr_gate_modules`` AND only if the
#     PR touched one of them. 20-min per-shard ceiling, kill-rate floor
#     enforced — a regression below baseline fails the workflow. If no
#     scoped module is touched the gate exits 0 with a "no scoped
#     modules touched" log line. This is the velocity-policy-scoped
#     subset; full PR gate (Epic U) ships in 1.4 — see plan
#     `Mutation-testing PR-gate scoped subset`.
#   - Pull request with ``breaking-change`` label (broad, advisory):
#     mutate every critical-path file the PR changed (from
#     ``[tool.mutmut].paths_to_mutate``); 15-min hard per-shard
#     timeout. Non-blocking — baseline regressions surface as workflow
#     warnings, not as merge blockers.
#   - Schedule (Monday 06:00 UTC) / workflow_dispatch (comprehensive):
#     mutate the full critical-path set from
#     ``[tool.mutmut].paths_to_mutate``; 120-min per-shard ceiling;
#     ``--runner "pytest -x"`` + ``--use-coverage`` (skips lines with
#     no test coverage — major speedup). Generates an aggregated
#     ``mutmut-html-report`` artifact for async tech-debt review.
#
# The broad PR lane + schedule are non-blocking via
# ``continue-on-error: true``; the scoped PR-gate is blocking.
# PR-mode is scoped per the velocity policy. Full PR gate (Epic U)
# ships in 1.4 — see plan.

on:
  schedule:
    # First day of the week, 06:00 UTC. Lines up with the Monday
    # maintainer schedule without hitting GitHub's weekend rate caps.
    - cron: "0 6 * * 1"
  workflow_dispatch: {}
  pull_request:
    # ``opened`` + ``reopened`` so the scoped PR-gate fires the first
    # time a PR appears (the broad lane keeps its own ``if:`` label
    # check so its behaviour is unchanged). ``labeled`` keeps the
    # ``breaking-change`` flow firing when the label is applied
    # post-open.
    types: [opened, reopened, labeled, synchronize]
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write

# Serialise scheduled runs vs a concurrent ``workflow_dispatch`` so two
# mutmut processes don't race on the check-run write or clobber the
# aggregated HTML report.
#
# ``cancel-in-progress: false`` is deliberate. A workflow-level group
# fires BEFORE the per-job label filter, so adding any unrelated PR
# label (eg. ``needs-review``) to a PR that already carries
# ``breaking-change`` would otherwise cancel the in-flight mutation
# shards. Mutmut shards are non-blocking (``continue-on-error: true``)
# and the schedule is weekly, so the queue depth stays bounded; the
# cost of one or two redundant setup-only runs is far less than the
# cost of losing a real mutation report mid-flight.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Pin once so every job — and the enforce script's baseline keys —
# stays in sync. Bumping this requires re-keying tests/mutmut_baselines.json
# (mutation IDs are not stable across major versions).
env:
  MUTMUT_VERSION: "2.5.0"

jobs:
  setup:
    # For PR events, only run when the ``breaking-change`` label is
    # present. The ``synchronize`` event fires on every push to a
    # labelled PR; the check still gates on the label being present
    # when the run starts.
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'breaking-change')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      paths: ${{ steps.compute.outputs.paths }}
      skip: ${{ steps.compute.outputs.skip }}
      mode: ${{ steps.compute.outputs.mode }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Fetch enough history for ``git diff origin/main...HEAD`` on
          # PR events.
          fetch-depth: 0

      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          enable-cache: true

      - name: Set Python 3.13
        run: uv python install 3.13

      - name: Install
        run: uv sync --all-extras --dev

      - name: Compute paths-to-mutate
        id: compute
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            mode=pr
            # PR mode: only mutate critical-path files the PR touched.
            # Source the critical-path set from pyproject.toml so this
            # stays in sync with the nightly lane — a previous hard-coded
            # regex named pre-Epic-A modules (feature_injector / merge /
            # provenance / updater) and silently skipped PRs touching the
            # post-decomposition forge/sync/* + forge/appliers/* tree.
            changed=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")
            paths_json=$(echo "$changed" | uv run python -c "
          import json, sys, tomllib
          critical = set(tomllib.loads(open('pyproject.toml','rb').read().decode())['tool']['mutmut']['paths_to_mutate'])
          changed = {line for line in sys.stdin.read().splitlines() if line}
          print(json.dumps(sorted(critical & changed)))
          ")
            if [ "$paths_json" = "[]" ]; then
              echo "No critical-path files changed — skipping."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "paths=[]" >> "$GITHUB_OUTPUT"
              echo "mode=$mode" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            mode=nightly
            # Schedule / dispatch: full critical-path set from pyproject.
            paths_json=$(uv run python -c "import json, tomllib; print(json.dumps(tomllib.loads(open('pyproject.toml','rb').read().decode())['tool']['mutmut']['paths_to_mutate']))")
          fi
          echo "paths=$paths_json" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "Mode=$mode, sharding mutmut across: $paths_json"

      - name: Generate coverage data (nightly only)
        if: steps.compute.outputs.skip != 'true' && steps.compute.outputs.mode == 'nightly'
        run: |
          # mutmut ``--use-coverage`` reads ``.coverage`` to skip lines
          # with no test coverage — those mutants would survive trivially
          # anyway. Major speedup. Run pytest with coverage once here
          # so every mutate shard reuses the same ``.coverage``.
          # ``-p no:xdist`` because xdist's parallel workers each write
          # their own .coverage.<host>.<n>; combining is messy and the
          # serial run finishes in 2-5 min.
          uv run pytest -m "not e2e and not fuzz and not docker" \
            --cov=forge --cov-report= -p no:xdist || true
          if [ ! -f .coverage ]; then
            echo "::warning::.coverage not produced — mutmut shards will run without --use-coverage"
          fi

      - name: Upload coverage data
        if: steps.compute.outputs.skip != 'true' && steps.compute.outputs.mode == 'nightly'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutmut-coverage
          path: .coverage
          retention-days: 1
          if-no-files-found: warn
          # ``.coverage`` is a hidden file (leading dot); upload-artifact
          # v4 defaults to skipping hidden files. Without this the
          # artifact uploads empty and every mutate shard's download
          # fails with "Artifact not found for name: mutmut-coverage".
          include-hidden-files: true

  mutate:
    needs: setup
    if: needs.setup.outputs.skip != 'true'
    runs-on: ubuntu-latest
    # Non-blocking: a shard timeout doesn't fail the workflow. mutmut
    # is advisory tech-debt signal, not a merge gate (Path C).
    continue-on-error: true
    # PR mode: 15-min hard ceiling per shard (fast feedback). Nightly:
    # 120 min per shard for the full mutation surface.
    timeout-minutes: ${{ needs.setup.outputs.mode == 'pr' && 15 || 120 }}
    strategy:
      # Don't cancel sibling shards on failure — we want partial data
      # even if one shard misbehaves.
      fail-fast: false
      matrix:
        path: ${{ fromJSON(needs.setup.outputs.paths) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          enable-cache: true

      - name: Set Python 3.13
        run: uv python install 3.13

      - name: Install
        run: uv sync --all-extras --dev

      - name: Download coverage data (nightly only)
        if: needs.setup.outputs.mode == 'nightly'
        # If the setup upload warned (no .coverage produced), the
        # download will 404. That's fine — the next step gates
        # ``--use-coverage`` on ``[ -f .coverage ]``, so a missing
        # artifact just means the shard runs without the coverage
        # speedup rather than failing.
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mutmut-coverage
          path: .

      - name: Run mutmut on ${{ matrix.path }}
        run: |
          set -euo pipefail
          # ``uvx mutmut`` per the comment on ``[tool.mutmut]`` in
          # pyproject.toml — mutmut is intentionally NOT in dev-deps so
          # the analysis tool stays out of the regular dependency
          # surface. Pin via workflow ``env`` so every step stays in
          # sync.
          # Flags:
          #   ``--runner "pytest -x"``: stop the test runner on first
          #     failure. mutmut only needs one failure to mark a mutant
          #     killed; this typically cuts per-mutant time 50-80%.
          #   ``--use-coverage`` (nightly only): skip mutating lines
          #     with no test coverage. Pre-computed ``.coverage`` is
          #     downloaded above. PR-mode skips this — the diff surface
          #     is small enough that the coverage-load overhead isn't
          #     worth it.
          file="${{ matrix.path }}"
          mode="${{ needs.setup.outputs.mode }}"
          coverage_flag=""
          if [ "$mode" = "nightly" ] && [ -f .coverage ]; then
            coverage_flag="--use-coverage"
          fi
          echo "::group::mutmut run on $file (mode=$mode)"
          uvx "mutmut@${MUTMUT_VERSION}" run \
            --paths-to-mutate "$file" \
            --runner "pytest -x" \
            $coverage_flag || true
          uvx "mutmut@${MUTMUT_VERSION}" results > "mutmut-results-${file//\//_}.txt" || true
          # ``mutmut html`` writes to ./html/ by default. Move into a
          # per-shard subdir so the report job can merge without
          # collisions across shards.
          uvx "mutmut@${MUTMUT_VERSION}" html || true
          mkdir -p "html-shard-${file//\//_}"
          if [ -d html ]; then
            mv html/* "html-shard-${file//\//_}/" 2>/dev/null || true
            rmdir html 2>/dev/null || true
          fi
          echo "::endgroup::"

      - name: Sanitize artifact name
        id: artname
        if: always()
        run: |
          path="${{ matrix.path }}"
          # GitHub artifact names can't contain '/'.
          echo "name=mutmut-results-shard-${path//\//_}" >> "$GITHUB_OUTPUT"

      - name: Upload shard results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.artname.outputs.name }}
          path: |
            mutmut-results-*.txt
            html-shard-*/
          retention-days: 30
          if-no-files-found: warn

  report:
    needs: [setup, mutate]
    # ``always()`` so partial shard data — including all-shards-cancelled
    # — still produces a report and an advisory enforcement pass.
    if: always() && needs.setup.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Non-blocking: a baseline regression is a warning to investigate
    # async, not a workflow failure (Path C).
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          enable-cache: true

      - name: Set Python 3.13
        run: uv python install 3.13

      - name: Install
        run: uv sync --all-extras --dev

      - name: Download all shard results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: mutmut-results-shard-*
          path: shard-results
          merge-multiple: false

      - name: Generate aggregated HTML report
        run: |
          # Combine each shard's html-shard-*/ into a single browsable
          # tree under mutmut-html/. Each shard mutates a different
          # file, so the per-source HTML files don't collide.
          set -euo pipefail
          mkdir -p mutmut-html
          shopt -s globstar nullglob
          copied=0
          for d in shard-results/*/html-shard-*/; do
            if [ -d "$d" ]; then
              cp -r "$d"* mutmut-html/ 2>/dev/null || true
              copied=$((copied + 1))
            fi
          done
          if [ "$copied" = "0" ]; then
            cat > mutmut-html/index.html <<'EOF'
          <html><body>
          <h1>No mutmut HTML available</h1>
          <p>Every shard either timed out or produced no html output.
          Check the per-shard ``mutmut-results-*.txt`` artifacts and
          the workflow logs for cancellation reasons.</p>
          </body></html>
          EOF
          fi
          echo "Aggregated $copied shard HTML directories into mutmut-html/"

      - name: Upload aggregated HTML report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutmut-html-report
          path: mutmut-html
          retention-days: 30
          if-no-files-found: warn

      - name: Enforce kill-rate baselines (advisory)
        run: |
          # Path C: non-blocking. The script still detects regressions
          # and prints them; we mask its non-zero exit and surface a
          # workflow warning instead of failing the job. The team
          # triages real regressions async via the HTML report
          # artifact, not under merge pressure.
          set +e
          uv run python .github/workflows/scripts/mutmut_enforce.py shard-results
          code=$?
          set -e
          case "$code" in
            0)
              echo "All mutmut baselines met."
              ;;
            1)
              echo "::warning::mutmut baselines regressed (advisory — non-blocking). Review the mutmut-html-report artifact and tests/mutmut_baselines.json."
              ;;
            *)
              echo "::warning::mutmut_enforce exited with code $code (likely no result data — all shards may have timed out)."
              ;;
          esac
          exit 0

  # Scoped PR-gate (blocking).
  #
  # Fires on every PR (not gated by ``breaking-change`` label). The
  # scope is intentionally narrow — only the three highest-blast-radius
  # modules listed in ``tests/mutmut_baselines.json:pr_gate_modules``
  # — so the wall-clock cost stays sub-20-minutes per shard. Files
  # touched by the PR are intersected with that scoped set; if no
  # scoped file is touched the gate exits 0 with a "no scoped modules
  # touched" log line and no mutation analysis runs.
  #
  # Failure mode: a touched module's mutmut kill rate drops below its
  # baseline floor in ``pr_gate_modules`` -> the workflow fails and the
  # PR is blocked. Either add tests to kill the new survivors or
  # lower the floor with a CHANGELOG entry + reviewer sign-off.
  pr_gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Need history for ``git diff origin/<base>...HEAD``.
          fetch-depth: 0

      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          enable-cache: true

      - name: Set Python 3.13
        run: uv python install 3.13

      - name: Install
        run: uv sync --all-extras --dev

      - name: Compute touched scoped modules
        id: scope
        run: |
          set -euo pipefail
          changed=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")
          echo "Changed files:"
          echo "$changed"
          paths_json=$(echo "$changed" | uv run python -c "
          import json, sys
          baselines = json.loads(open('tests/mutmut_baselines.json').read())
          scoped = set(baselines['pr_gate_modules'].keys())
          changed = {line for line in sys.stdin.read().splitlines() if line}
          print(json.dumps(sorted(scoped & changed)))
          ")
          if [ "$paths_json" = "[]" ]; then
            echo "no scoped modules touched — skipping mutation analysis"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "paths=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "scoped touched modules: $paths_json"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "paths=$paths_json" >> "$GITHUB_OUTPUT"

      - name: Run mutmut on each touched scoped module
        if: steps.scope.outputs.skip != 'true'
        run: |
          set -euo pipefail
          mkdir -p pr-gate-results
          paths='${{ steps.scope.outputs.paths }}'
          echo "$paths" | uv run python -c "
          import json, sys
          for p in json.load(sys.stdin):
              print(p)
          " | while IFS= read -r file; do
            echo "::group::mutmut run on $file"
            # Fresh cache per file so each module's results are independent.
            rm -rf .mutmut-cache
            # ``mutmut run`` exit codes are bit-flags (1=fatal, 2=survived,
            # 4=timeout, 8=slow); a non-zero exit can mean "some mutants
            # survived" which is data we still want. ``|| true`` lets the
            # enforce step read the cache regardless.
            uvx "mutmut@${MUTMUT_VERSION}" run \
              --paths-to-mutate "$file" \
              --runner "pytest -x" || true
            # ``mutmut results`` text output triggers a pony-ORM bytecode
            # decompile crash on Python 3.13 (mutmut 2.5.0); read the
            # SQLite cache directly for a portable kill-rate summary.
            uv run python .github/workflows/scripts/mutmut_kill_rate.py \
              .mutmut-cache > "pr-gate-results/rate-${file//\//_}.json"
            echo "::endgroup::"
          done

      - name: Enforce per-module kill-rate floors (blocking)
        if: steps.scope.outputs.skip != 'true'
        run: |
          set -euo pipefail
          uv run python .github/workflows/scripts/mutmut_pr_gate.py \
            --baselines tests/mutmut_baselines.json \
            --results-dir pr-gate-results \
            --touched '${{ steps.scope.outputs.paths }}'

      - name: Upload PR-gate results
        if: always() && steps.scope.outputs.skip != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutmut-pr-gate-results
          path: pr-gate-results/
          retention-days: 14
          if-no-files-found: warn

      - name: Note skip
        if: steps.scope.outputs.skip == 'true'
        run: echo "no scoped modules touched — mutation analysis skipped (exit 0)"
