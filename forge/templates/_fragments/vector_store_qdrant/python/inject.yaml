# Qdrant adapter — registers itself with the container only when the
# user opts into `rag.backend=qdrant`. Port ships from vector_store_port.

- target: src/app/core/container.py
  marker: FORGE:APP_POST_CONFIGURE
  position: after
  zone: generated
  snippet: |-
    # Vector-store adapter: Qdrant — wired lazily so module import doesn't
    # error out when the user hasn't set ``QDRANT_URL`` yet (template
    # ships without qdrant config fields on ``Settings``).
    import os as _qdrant_os

    from app.adapters.vector_store.qdrant import QdrantAdapter

    _qdrant_adapter = QdrantAdapter(
        url=_qdrant_os.environ.get("QDRANT_URL", "http://localhost:6333"),
        api_key=_qdrant_os.environ.get("QDRANT_API_KEY"),
        collection_prefix=_qdrant_os.environ.get("QDRANT_COLLECTION", "default"),
    )
