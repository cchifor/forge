# rag_pipeline injections.
# 1. Mount /api/v1/rag router for ingest/search.
# 2. Import rag_search_tool at lifecycle startup — the module's own
#    _try_register() call decides whether to actually register into the
#    ToolRegistry (no-op if agent_tools isn't enabled). This way users
#    can enable rag_pipeline without agent_tools and still get the REST
#    endpoints, just without LLM tool-access.

- target: src/app/api/v1/api.py
  marker: FORGE:API_ENDPOINT_IMPORTS
  position: before
  snippet: "from app.api.v1.endpoints import rag as rag_endpoint"

- target: src/app/api/v1/api.py
  marker: FORGE:API_ROUTER_REGISTRATION
  position: before
  snippet: 'api_router.include_router(rag_endpoint.router, prefix="/rag", tags=["rag"])'

- target: src/app/core/lifecycle.py
  marker: FORGE:LIFECYCLE_STARTUP
  position: before
  snippet: "import app.rag.rag_search_tool  # noqa: F401 — side-effect: registers rag_search if agent_tools is enabled"
