_subdirectory: template
_templates_suffix: .jinja
_skip_if_exists:
  - ".secrets.yaml"
  - "*.db"
_exclude:
  - ".venv"
  - "__pycache__"
  - ".pytest_cache"
  - ".mypy_cache"
  - ".ruff_cache"
  - "*.pyc"

# ---------------------------------------------------------------------------
# Questions (prompted during generation)
# ---------------------------------------------------------------------------

project_name:
  type: str
  help: "Service name in kebab-case (e.g. knowledge, workflow, gpt)"
  default: "my-service"
  validator: "{% if not project_name | regex_search('^[a-z][a-z0-9-]*$') %}Must be lowercase kebab-case (e.g. my-service){% endif %}"

project_description:
  type: str
  help: "One-line description of the service"
  default: "A Python microservice"

server_port:
  type: int
  help: "HTTP server port"
  default: 5000

db_name:
  type: str
  help: "PostgreSQL database name"
  default: "{{ project_name | replace('-', '_') }}"

python_version:
  type: str
  help: "Python version"
  default: "3.13"
  choices:
    - "3.13"
    - "3.14"

# ---------------------------------------------------------------------------
# 1.2.0 — weld-* SDK consumption
# ---------------------------------------------------------------------------

sdk_consumption:
  type: str
  help: |
    Whether a project-root ``sdks/`` tree is exposed as a docker build
    context. `monorepo` (default): the platform-monorepo target — declares
    ``additional_contexts: { sdks: ./sdks }`` so the Dockerfile's
    ``COPY --from=sdks`` (platform-auth, when auth is generated) resolves.
    `standalone` / `none`: no sibling ``sdks/`` build context.
    The always-shipped forge-core SDK lives *inside* each backend
    (``sdks/forge-core``) and needs no extra build context, so a default
    project builds standalone regardless of this setting.
  default: "monorepo"
  choices:
    - "monorepo"   # platform-monorepo target: expose ../../sdks as a docker build context
    - "standalone" # standalone target — no sibling sdks/ build context
    - "none"       # no sibling sdks/ build context

include_platform_auth:
  type: bool
  help: |
    Add the ``platform-auth`` runtime SDK as a dependency (with a
    [tool.uv.sources] path-dep against ``../../sdks/platform-auth``).
    Set by the generator when the ``platform_auth_python_middleware``
    fragment is in the active plan. Non-auth Python services default to
    false and don't reference platform-auth at all.
  default: false

include_error_envelope:
  type: bool
  help: |
    Wire ``app/core/errors.py``'s central handler through the
    ``DefaultErrorPort`` adapter shipped by the ``error_port`` fragment
    (Pillar E.1.b runtime wiring). Default ``false`` is fail-safe: the
    generator flips it on only when the ``error_port`` fragment is in
    the active plan (see ``includes_error_envelope`` in
    ``forge/generator.py``). The Python soft-import would still handle
    a missing adapter, but defaulting off keeps emitted code minimal in
    the common case.
  default: false

service_path_prefix:
  type: str
  help: "Traefik PathPrefix used for routing this service (e.g. /api/{{ project_slug }})"
  default: "/api/{{ project_slug }}"

# ---------------------------------------------------------------------------
# Derived variables (not prompted)
# ---------------------------------------------------------------------------

project_title:
  type: str
  when: false
  default: "{{ project_name | replace('-', ' ') | title }}"

project_slug:
  type: str
  when: false
  default: "{{ project_name | replace('-', '_') }}"

entity_plural:
  type: str
  when: false
  default: "items"
