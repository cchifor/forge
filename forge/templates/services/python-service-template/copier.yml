_subdirectory: template
_templates_suffix: .jinja
_skip_if_exists:
  - ".secrets.yaml"
  - "*.db"
_exclude:
  - ".venv"
  - "__pycache__"
  - ".pytest_cache"
  - ".mypy_cache"
  - ".ruff_cache"
  - "*.pyc"

# ---------------------------------------------------------------------------
# Questions (prompted during generation)
# ---------------------------------------------------------------------------

project_name:
  type: str
  help: "Service name in kebab-case (e.g. knowledge, workflow, gpt)"
  default: "my-service"
  validator: "{% if not project_name | regex_search('^[a-z][a-z0-9-]*$') %}Must be lowercase kebab-case (e.g. my-service){% endif %}"

project_description:
  type: str
  help: "One-line description of the service"
  default: "A Python microservice"

server_port:
  type: int
  help: "HTTP server port"
  default: 5000

db_name:
  type: str
  help: "PostgreSQL database name"
  default: "{{ project_name | replace('-', '_') }}"

python_version:
  type: str
  help: "Python version"
  default: "3.13"
  choices:
    - "3.13"
    - "3.14"

# ---------------------------------------------------------------------------
# 1.2.0 — weld-* SDK consumption
# ---------------------------------------------------------------------------

sdk_consumption:
  type: str
  help: |
    How should the generated service consume weld-* SDKs?
    `monorepo` (default): path deps to ../../sdks/weld-* — drop into
    platform/services/ so the SDKs resolve from the platform's own
    sdks/ tree. `standalone`: pin PyPI versions (requires weld-* to be
    published; reserved). `none`: skip weld-* deps entirely — only
    coherent if you've also re-introduced an in-tree shim (the base
    template no longer ships one).
    The 1.2.0-alpha.1 cutover removed src/service/, so generated
    services REQUIRE weld-* to be installable. In CI environments
    without the platform sibling tree, ``uv sync`` will fail until
    weld-* ships to PyPI — track GH-ISSUE-TBD.
  default: "monorepo"
  choices:
    - "monorepo"   # path deps to ../../sdks/weld-* — drop into platform/services/
    - "standalone" # pinned PyPI versions — requires weld-* to be published
    - "none"       # don't declare weld-* deps (legacy 1.1.x — only coherent with a re-vendored src/service/)

weld_base_sdks:
  type: str
  help: "Comma-separated weld-* SDKs to declare in pyproject (used when sdk_consumption != none)"
  default: "auth,core,fastapi,observability,http-client,events"

include_platform_auth:
  type: bool
  help: |
    Add the ``platform-auth`` runtime SDK as a dependency (with a
    [tool.uv.sources] path-dep against ``../../sdks/platform-auth``).
    Set by the generator when the ``platform_auth_python_middleware``
    fragment is in the active plan. Non-auth Python services default to
    false and don't reference platform-auth at all.
  default: false

service_path_prefix:
  type: str
  help: "Traefik PathPrefix used for routing this service (e.g. /api/{{ project_slug }})"
  default: "/api/{{ project_slug }}"

# ---------------------------------------------------------------------------
# Derived variables (not prompted)
# ---------------------------------------------------------------------------

project_title:
  type: str
  when: false
  default: "{{ project_name | replace('-', ' ') | title }}"

project_slug:
  type: str
  when: false
  default: "{{ project_name | replace('-', '_') }}"

entity_plural:
  type: str
  when: false
  default: "items"
