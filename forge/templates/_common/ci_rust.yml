name: CI (rust service)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ``stable`` is preinstalled on ubuntu runners; add the lint components.
      - name: Add rustfmt + clippy
        run: rustup component add rustfmt clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: Format check
        run: cargo fmt --all -- --check

      # ``--locked`` builds the exact versions the committed Cargo.lock pins,
      # so a stale lockfile fails HERE (matching the prod Docker
      # ``cargo build --locked``) rather than only in the image build. The
      # ``$([ -f Cargo.lock ] ...)`` guard falls back to an unlocked build
      # when no lockfile is committed.
      # Runtime-checked sqlx (no ``query!`` macros) — build needs no database.
      - name: Clippy
        run: cargo clippy --workspace --all-targets $([ -f Cargo.lock ] && echo --locked)

      - name: Build
        run: cargo build --workspace $([ -f Cargo.lock ] && echo --locked)

      - name: Test
        run: cargo test --workspace $([ -f Cargo.lock ] && echo --locked)

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit || true
      - name: Audit
        run: cargo audit || true  # warn-only in alpha
