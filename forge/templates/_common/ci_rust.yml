name: CI (rust service)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ``stable`` is preinstalled on ubuntu runners; add the lint components.
      - name: Add rustfmt + clippy
        run: rustup component add rustfmt clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Format check
        run: cargo fmt --all -- --check

      # Runtime-checked sqlx (no ``query!`` macros) — build needs no database.
      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit || true
      - name: Audit
        run: cargo audit || true  # warn-only in alpha
