name: CI (node service)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "22"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # Installs every workspace (services/*, sdks/*, apps/*). The in-tree
      # SDKs build first via their own ``prepare`` scripts.
      - name: Install dependencies
        run: npm install

      # Prisma needs no database for ``generate`` — the client is built from
      # the committed schema. ``--if-present`` skips workspaces (e.g. a
      # stateless service) that ship no ``generate`` script.
      - name: Generate Prisma client(s)
        run: npm run generate --workspaces --if-present

      - name: Lint (biome)
        run: npm run lint

      - name: Build (tsc)
        run: npm run build

      - name: Test (vitest)
        run: npm test

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      # ``--package-lock-only`` resolves the tree without installing so audit
      # has a lockfile to scan even before one is committed.
      - name: Resolve lockfile
        run: npm install --package-lock-only
      - name: npm audit
        run: npm audit --audit-level=high || true  # warn-only in alpha
