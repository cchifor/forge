# UI app-shell layout manifest — discovered by forge.layout_variants.
#
# `bento` is a thin Copier overlay on top of the shared Flutter base template.
# The chassis is the base sidebar shell (AppSidebar + WorkingAreaHeader +
# tri-modal chat); the differentiator is a presentational BentoGrid region that
# replaces the plain content body with a responsive dashboard mosaic.
# The base renders first, then these files overlay it (two-stage render).
[layout]
name = "bento"
framework = "flutter"
display_label = "Bento Grid Dashboard"
template_dir = "layouts/flutter/bento"
base = "apps/flutter-frontend-template"
supported = true
