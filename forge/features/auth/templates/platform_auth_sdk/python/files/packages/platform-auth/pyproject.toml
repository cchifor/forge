[project]
name = "platform-auth"
version = "0.1.0"
description = "Identity, RBAC, and S2S authentication primitives for the platform services"
requires-python = ">=3.11"
dependencies = [
    "PyJWT>=2.10.0",
    "cachetools>=5.5.0",
    "httpx>=0.28.0",
    "redis>=5.0.0",
]

[project.optional-dependencies]
fastapi = ["fastapi>=0.115.0"]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.0.0",
    "pytest-benchmark>=5.0.0",
    "ruff>=0.15.0",
    "cryptography>=44.0.0",
    "fakeredis>=2.26.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/platform_auth"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "--cov=platform_auth --cov-report=term-missing --cov-branch"
markers = [
    "unit: unit tests",
    "integration: integration tests",
    "benchmark: performance benchmarks",
]

[tool.coverage.run]
source = ["src/platform_auth"]
branch = true

[tool.coverage.report]
fail_under = 85
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "@abstractmethod",
]

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "B", "UP", "RUF"]
