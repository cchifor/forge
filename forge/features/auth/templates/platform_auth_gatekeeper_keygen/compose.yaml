# Declarative compose service for the gatekeeper-keygen init container.
#
# Runs once at stack startup, before gatekeeper boots, and writes ECDSA
# P-256 signing keys to the shared ``gatekeeper_signing_keys`` volume.
# Gatekeeper depends on this service via
# ``condition: service_completed_successfully`` so a missing/rotated key
# is regenerated transparently before the main process starts.
#
# Cross-reference: implementation plan at
# ~/.claude/plans/review-the-c-users-chifo-work-platform-a-pure-torvalds.md
# (Phase 2 — gatekeeper-keygen init service).

capability: gatekeeper-keygen

service:
  name: gatekeeper-keygen
  image: forge-gatekeeper:local  # same image as gatekeeper; overrides command
  command: ["python", "scripts/keygen.py"]
  networks:
    - app-network
  restart: "no"  # one-shot; not service-managed restart

  volumes:
    - "gatekeeper_signing_keys:/run/secrets/gatekeeper-signing"

  named_volumes:
    - gatekeeper_signing_keys

  environment:
    SIGNING_KEY_DIR: "/run/secrets/gatekeeper-signing"
    KEY_BACKEND: "file"

  # ``extra`` passes through to docker-compose verbatim. ``user: root``
  # overrides the Dockerfile's USER appuser (uid 10001) — Docker creates
  # named volumes as root, so the one-shot keygen init container needs
  # root to write the signing key. The main gatekeeper service mounts
  # the volume :ro under its own unprivileged user.
  extra:
    user: root
    build:
      context: ./deploy/infra/gatekeeper
      dockerfile: Dockerfile
