# Service-to-service client registry for the gatekeeper /auth/token endpoint.
#
# Each entry is one calling service. ``secret_hash`` is an argon2id hash of
# the dev pre-shared secret; the calling service stores the plaintext in
# its own GATEKEEPER_CLIENT_SECRET env var. Rotation: regenerate the hash
# (`uv run python -c 'from argon2 import PasswordHasher; print(PasswordHasher().hash("...")'`),
# replace it here, restart gatekeeper, redeploy the calling service.
#
# DEV SECRETS DOCUMENTED HERE FOR ONBOARDING:
#   svc-workflow    → dev-workflow-secret-rotate-me
#   svc-integration → dev-integration-secret-rotate-me
#   svc-mcp         → dev-mcp-secret-rotate-me
#   svc-knowledge   → dev-knowledge-secret-rotate-me
#   svc-deepagent   → dev-deepagent-secret-rotate-me
#
# These are NEVER acceptable in production. Production deployments use the
# k8s ProjectedSAToken verifier (follow-up ticket WS3-k8s-sa-verifier).

services:
  - client_id: svc-workflow
    secret_hash: "$argon2id$v=19$m=65536,t=3,p=4$0i7SUpbZyS4Q7CilyeB+nQ$RhBi6xE09lX3Ya6XzFGk3R8p7XB0XvrvJi3NsCFW1pc"
    k8s_subject: "system:serviceaccount:platform:workflow"
    audiences:
      svc-knowledge:
        scopes: [knowledge:read]
      svc-mcp:
        scopes: [mcp:read, mcp:write]
    may_act_for_audiences: []

  - client_id: svc-integration
    secret_hash: "$argon2id$v=19$m=65536,t=3,p=4$mBCryJPQKGFHBvDr+PZSrA$rzyjEPH1/5KATOBnOYLBudKKtcP6/QRm7s+lzrD4Qzg"
    k8s_subject: "system:serviceaccount:platform:integration"
    audiences:
      svc-mcp:
        scopes: [mcp:read, mcp:write]
      svc-airlock:
        scopes: [airlock:read, airlock:write]
    may_act_for_audiences: []

  - client_id: svc-mcp
    secret_hash: "$argon2id$v=19$m=65536,t=3,p=4$FIJbz5p93Sb7CL81s7stpQ$KNWQxBEviM46tbmfHE5LXyoipSqtNeaUOicEO/XezCo"
    k8s_subject: "system:serviceaccount:platform:mcp"
    audiences:
      svc-integration:
        scopes: [integration:read]
    may_act_for_audiences: []

  - client_id: svc-knowledge
    secret_hash: "$argon2id$v=19$m=65536,t=3,p=4$6OhGVIZArg0auyTpuMSFig$xLD22jGLme4ZHRuxFtoMZ6j+0inV5aJodDyS55U6xWc"
    k8s_subject: "system:serviceaccount:platform:knowledge"
    audiences:
      svc-mcp:
        scopes: [mcp:read]
    may_act_for_audiences: []

  - client_id: svc-deepagent
    secret_hash: "$argon2id$v=19$m=65536,t=3,p=4$jWjvkteb+0r4EUqxu0Fjpw$8v4ITtiQB3U+234OR3OeEJXDfwhYcYGb7PKQ9mNfpAU"
    k8s_subject: "system:serviceaccount:platform:deepagent"
    audiences:
      svc-mcp:
        scopes: [mcp:read, mcp:write]
      svc-integration:
        scopes: [integration:read]
      svc-airlock:
        scopes: [airlock:read]
    # deepagent is the canonical "user-on-behalf-of" caller — it acts
    # for the user that triggered the conversation.
    may_act_for_audiences:
      - svc-mcp
      - svc-integration
      - svc-airlock
