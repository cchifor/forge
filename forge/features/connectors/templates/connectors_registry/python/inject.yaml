# connectors_registry: register ConnectorRegistry as an app-scoped provider.
# Backends listed in connectors.backends are pre-enabled in build_connector_registry;
# additional adapters can be registered from the lifespan hook.

- target: src/app/core/ioc/infra.py
  marker: FORGE:IOC_INFRA_IMPORTS
  position: before
  snippet: "from app.connectors import ConnectorRegistry, build_connector_registry"

- target: src/app/core/ioc/infra.py
  marker: FORGE:IOC_INFRA_PROVIDERS
  position: before
  snippet: |
    @provide(scope=Scope.APP)
    def connector_registry(self) -> ConnectorRegistry:
        return build_connector_registry()
