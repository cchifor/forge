# observability_otel — Rust.
#
# Adds the OpenTelemetry OTLP dependencies, registers the `otel` module, and
# pushes an OTLP tracing layer onto the base template's layer set so spans
# from every `tracing` event export to the configured collector.

- target: Cargo.toml
  marker: FORGE:CARGO_DEPENDENCIES
  position: after
  zone: generated
  snippet: |-
    opentelemetry = "0.27"
    opentelemetry_sdk = { version = "0.27", features = ["rt-tokio"] }
    opentelemetry-otlp = { version = "0.27", features = ["http-proto", "reqwest-client"] }
    tracing-opentelemetry = "0.28"

- target: src/lib.rs
  marker: FORGE:LIB_MOD_REGISTRATION
  position: after
  zone: generated
  snippet: "pub mod otel;"

- target: src/main.rs
  marker: FORGE:MAIN_MOD_REGISTRATION
  position: after
  zone: generated
  snippet: "mod otel;"

- target: src/main.rs
  marker: FORGE:TRACING_LAYERS
  position: before
  zone: generated
  snippet: |-
    let service_name =
        std::env::var("OTEL_SERVICE_NAME").unwrap_or_else(|_| "forge-service".to_string());
    if let Some(otel_layer) = otel::otel_layer(&service_name) {
        layers.push(otel_layer);
    }
