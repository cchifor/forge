{{- /* In-cluster datastores — DEV/DEMO ONLY (kind, minikube).

       Disabled by default (infra.inCluster=false): the production posture is
       managed/external Postgres, Redis, and Keycloak referenced via
       externalServices. Flip infra.inCluster=true to get throwaway in-cluster
       stand-ins. These are intentionally minimal and NOT production-grade. */ -}}
{{- if .Values.infra.inCluster }}
{{- if .Values.infra.postgres }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ printf "%s-postgres" .Release.Name | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/name: postgres
spec:
  serviceName: {{ printf "%s-postgres" .Release.Name | trunc 63 | trimSuffix "-" }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/name: postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.infra.postgres.image | quote }}
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.infra.postgres.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-postgres" .Release.Name | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/name: postgres
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
{{- end }}
{{- if .Values.infra.redis }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-redis" .Release.Name | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/name: redis
    spec:
      containers:
        - name: redis
          image: {{ .Values.infra.redis.image | quote }}
          ports:
            - name: redis
              containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-redis" .Release.Name | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/name: redis
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
{{- end }}
{{- if .Values.infra.keycloak }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-keycloak" .Release.Name | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/name: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/name: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/name: keycloak
    spec:
      containers:
        - name: keycloak
          image: {{ .Values.infra.keycloak.image | quote }}
          args: ["start-dev"]
          env:
            - name: KEYCLOAK_ADMIN
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: admin
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-keycloak" .Release.Name | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/name: keycloak
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/name: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: http
{{- end }}
{{- if and .Values.infra.gatekeeper .Values.infra.gatekeeper.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-gatekeeper-registry" .Release.Name | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/name: gatekeeper
type: Opaque
stringData:
  service_registry.yaml: |
    # Placeholder S2S registry — override with your real registry (argon2
    # hashes of per-service shared secrets). See docs/DEPLOYMENT.md.
    services: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-gatekeeper" .Release.Name | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/name: gatekeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/name: gatekeeper
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/name: gatekeeper
    spec:
      initContainers:
        # keygen mints ES256 signing keys into a pod-shared emptyDir before the
        # gatekeeper server starts (the compose keygen one-shot, in-pod form).
        - name: keygen
          image: "{{ .Values.infra.gatekeeper.image.repository }}:{{ .Values.infra.gatekeeper.image.tag }}"
          imagePullPolicy: {{ .Values.infra.gatekeeper.image.pullPolicy }}
          command: ["python", "scripts/keygen.py"]
          env:
            - name: SIGNING_KEY_DIR
              value: /run/secrets/gatekeeper-signing
            - name: KEY_BACKEND
              value: file
          volumeMounts:
            - name: signing-keys
              mountPath: /run/secrets/gatekeeper-signing
      containers:
        - name: gatekeeper
          image: "{{ .Values.infra.gatekeeper.image.repository }}:{{ .Values.infra.gatekeeper.image.tag }}"
          imagePullPolicy: {{ .Values.infra.gatekeeper.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 5000
          env:
            - name: ENV
              value: development
            - name: KEYCLOAK_BASE_URL
              value: http://{{ printf "%s-keycloak" .Release.Name }}:8080/realms
            - name: GATEKEEPER_CLIENT_ID
              value: gatekeeper
            - name: GATEKEEPER_CLIENT_SECRET
              value: {{ .Values.infra.gatekeeper.clientSecret | quote }}
            - name: REDIS_URL
              value: redis://{{ printf "%s-redis" .Release.Name }}:6379
            - name: GATEKEEPER_ISSUER
              value: http://{{ printf "%s-gatekeeper" .Release.Name }}:5000
            - name: SIGNING_KEY_DIR
              value: /run/secrets/gatekeeper-signing
            - name: KEY_BACKEND
              value: file
            - name: SERVICE_REGISTRY_PATH
              value: /run/secrets/gatekeeper-service-registry/service_registry.yaml
          volumeMounts:
            - name: signing-keys
              mountPath: /run/secrets/gatekeeper-signing
              readOnly: true
            - name: service-registry
              mountPath: /run/secrets/gatekeeper-service-registry
              readOnly: true
          livenessProbe:
            httpGet:
              path: /auth/jwks
              port: http
          readinessProbe:
            httpGet:
              path: /auth/jwks
              port: http
      volumes:
        - name: signing-keys
          emptyDir: {}
        - name: service-registry
          secret:
            secretName: {{ printf "%s-gatekeeper-registry" .Release.Name | trunc 63 | trimSuffix "-" }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-gatekeeper" .Release.Name | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/name: gatekeeper
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/name: gatekeeper
  ports:
    - name: http
      port: 5000
      targetPort: http
{{- end }}
{{- end }}
