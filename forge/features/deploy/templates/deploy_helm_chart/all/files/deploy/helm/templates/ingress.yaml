{{- /* HTTP ingress — replaces the dev-only Traefik in docker-compose.

       Path rules (/api/<backend>) come from the topology so they mirror the
       compose routing. The rewrite annotation in values.yaml is nginx-ingress
       specific; for a different controller, change ingress.className and
       ingress.annotations (e.g. a Traefik Middleware, or the Gateway API). */ -}}
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          {{- range .Values.ingress.paths }}
          - path: {{ .path | quote }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ printf "%s-%s" $.Release.Name .service | trunc 63 | trimSuffix "-" }}
                port:
                  number: 80
          {{- end }}
          {{- if .Values.frontend.enabled }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ printf "%s-frontend" $.Release.Name | trunc 63 | trimSuffix "-" }}
                port:
                  number: 80
          {{- end }}
{{- end }}
