{{- /* One Deployment per backend workload. The map is generated from the
       project's deployment topology, so `forge --update` adds/removes a
       backend's Deployment automatically. */ -}}
{{- range $name, $w := .Values.workloads }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-%s" $.Release.Name $name | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "app.labels" $ | nindent 4 }}
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/component: backend
spec:
  {{- if not $w.autoscaling.enabled }}
  replicas: {{ $w.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ $.Release.Name }}
      app.kubernetes.io/name: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/name: {{ $name }}
    spec:
      securityContext:
        {{- toYaml $.Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ $name }}
          image: "{{ $w.image.repository }}:{{ $w.image.tag }}"
          imagePullPolicy: {{ $w.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $w.containerPort }}
          envFrom:
            - configMapRef:
                name: {{ printf "%s-%s-config" $.Release.Name $name | trunc 63 | trimSuffix "-" }}
            - secretRef:
                name: {{ printf "%s-%s-secret" $.Release.Name $name | trunc 63 | trimSuffix "-" }}
                optional: true
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: http
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: http
          resources:
            {{- toYaml $w.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
{{- end }}
