{{- /* DB migration Jobs — one per backend that ships migrations. Run as a
       pre-install/pre-upgrade Helm hook so the schema is current before the
       Deployment rolls. A failed migration blocks the release (intended).

       PARALLELISM: every migrate Job uses the same hook-weight (-5), so Helm
       runs them concurrently. That is safe because each backend owns its own
       database (db_name = the backend's name), and migrations never touch
       another backend's schema. If you ever introduce a SHARED database that
       multiple backends migrate, give those Jobs distinct ascending
       hook-weights so Helm serialises them.

       The gatekeeper keygen runs as an initContainer on the in-cluster
       gatekeeper Deployment (templates/infra.yaml); the keycloak realm-sync is
       the post-install Job below. Both are gated on infra.inCluster +
       infra.gatekeeper.enabled (dev/demo — production uses an external,
       managed gatekeeper). */ -}}
{{- range $name, $w := .Values.workloads }}
{{- if $w.hasMigrations }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-%s-migrate" $.Release.Name $name | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "app.labels" $ | nindent 4 }}
    app.kubernetes.io/name: {{ $name }}-migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/name: {{ $name }}-migrate
    spec:
      restartPolicy: Never
      securityContext:
        {{- toYaml $.Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          image: "{{ $w.image.repository }}:{{ $w.image.tag }}"
          imagePullPolicy: {{ $w.image.pullPolicy }}
          command: {{ toJson $w.migrateCommand }}
          envFrom:
            - configMapRef:
                name: {{ printf "%s-%s-config" $.Release.Name $name | trunc 63 | trimSuffix "-" }}
            - secretRef:
                name: {{ printf "%s-%s-secret" $.Release.Name $name | trunc 63 | trimSuffix "-" }}
                optional: true
{{- end }}
{{- end }}
{{- /* Keycloak realm-sync — in-cluster auth demo only (infra.inCluster +
       infra.gatekeeper). A post-install Job syncs the realm into the running
       Keycloak via its Admin API, reading the realm JSON bundled into the
       chart (deploy/helm/files/keycloak-realm.json) as a ConfigMap. */ -}}
{{- if and .Values.infra.inCluster .Values.infra.gatekeeper .Values.infra.gatekeeper.enabled }}
{{- $realm := .Files.Get "files/keycloak-realm.json" }}
{{- if $realm }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-keycloak-realm" .Release.Name | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/name: realm-sync
data:
  keycloak-realm.json: |
{{ $realm | indent 4 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-realm-sync" .Release.Name | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/name: realm-sync
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/name: realm-sync
    spec:
      restartPolicy: Never
      containers:
        - name: realm-sync
          image: "{{ .Values.infra.gatekeeper.image.repository }}:{{ .Values.infra.gatekeeper.image.tag }}"
          imagePullPolicy: {{ .Values.infra.gatekeeper.image.pullPolicy }}
          command: ["python", "scripts/realm_sync.py"]
          env:
            - name: ENV
              value: development
            - name: KEYCLOAK_BASE_URL
              value: http://keycloak:8080/realms
            - name: KEYCLOAK_ADMIN_REALM
              value: {{ .Values.infra.keycloak.realm | default "app" | quote }}
            - name: REALM_JSON_PATH
              value: /realm/keycloak-realm.json
          volumeMounts:
            - name: realm
              mountPath: /realm
              readOnly: true
      volumes:
        - name: realm
          configMap:
            name: {{ printf "%s-keycloak-realm" .Release.Name | trunc 63 | trimSuffix "-" }}
{{- end }}
{{- end }}
