{{- /* Per-backend Secret holding DB URLs / S2S credentials.

       IMPORTANT: forge ships ONLY placeholders here (the values.yaml secretEnv
       carries `CHANGEME` markers, never real or deterministic credentials).
       For production, either override secretEnv in values-prod.yaml, or delete
       these Secrets and wire an ExternalSecret / SealedSecret / CSI volume that
       pulls from your secrets manager. The Deployment's secretRef is marked
       optional so an externally-managed Secret of the same name takes over. */ -}}
{{- range $name, $w := .Values.workloads }}
{{- if $w.secretEnv }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-%s-secret" $.Release.Name $name | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "app.labels" $ | nindent 4 }}
    app.kubernetes.io/name: {{ $name }}
  annotations:
    # Pre-install/pre-upgrade hook at weight -10 (BEFORE the migrate Job at -5)
    # so the migrate Job's secretRef (DB URL) resolves on a FIRST install.
    # before-hook-creation keeps it for the main-phase Deployments. (audit #6)
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  {{- range $k, $v := $w.secretEnv }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
{{- end }}
