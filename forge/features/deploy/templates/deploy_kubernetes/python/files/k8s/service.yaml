apiVersion: v1
kind: Service
metadata:
  name: app-python
  labels:
    app.kubernetes.io/name: app
    app.kubernetes.io/component: python
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: app
    app.kubernetes.io/component: python
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
