apiVersion: v1
kind: ConfigMap
metadata:
  name: app-python-config
  labels:
    app.kubernetes.io/name: app
    app.kubernetes.io/component: python
data:
  # Non-secret runtime configuration. Secrets belong in a Secret + envFrom,
  # not here. Override per environment with a kustomize patch.
  ENV: "production"
  LOG_LEVEL: "info"
