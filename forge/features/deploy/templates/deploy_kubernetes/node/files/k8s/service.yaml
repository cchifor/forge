apiVersion: v1
kind: Service
metadata:
  name: app-node
  labels:
    app.kubernetes.io/name: app
    app.kubernetes.io/component: node
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: app
    app.kubernetes.io/component: node
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
