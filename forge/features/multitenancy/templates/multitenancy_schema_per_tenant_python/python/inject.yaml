# multitenancy_schema_per_tenant_python: wire schema-per-tenant isolation via
# TWO composed seams (both fail closed):
#
#   1. Engine "begin" listener (register_search_path_listener, at
#      LIFESPAN_STARTUP). On every transaction of the MAIN APP ENGINE
#      (``db.engine``) it binds search_path from the edge-resolved ContextVar
#      (header/subdomain) or, when unset, '' (fail closed). This covers all
#      sessions opened from the shared session factory, including raw/non-UoW
#      sessions on that engine. NOTE: a few features create their OWN standalone
#      engine (RAG worker/search, CLI, admin panel) — those are NOT covered;
#      such out-of-band code must register the listener on its engine or use
#      TenantSchemaHook (see SCHEMA_PER_TENANT.md). This matches the prior
#      behaviour (the listener was always attached to db.engine only).
#
#   2. UoW session binder (bind_tenant_search_path, installed at the
#      FORGE:UOW_SESSION_BINDER seam in ioc/security.py). It runs inside the
#      request handler (post-auth) and, ONLY when an authenticated account is
#      present, OVERWRITES the listener's binding with the account's tenant
#      schema. This is the token_claim path (the listener can't see a token
#      claim because it resolves pre-auth). With no account the binder is a
#      no-op, leaving the listener's header/subdomain-or-fail-closed binding.
#
# The middleware runs the resolver and sets the ContextVar for header/subdomain.
# The imperative TenantSchemaHook remains the explicit API for out-of-band code.
#
# There is NO migration: schema-per-tenant materializes each tenant's tables in
# its own schema at provision time (app.core.tenancy.schema.provision_tenant_schema),
# not via a one-shot Alembic policy migration.

- target: src/app/main.py
  marker: FORGE:MIDDLEWARE_IMPORTS
  position: before
  snippet: "from app.middleware.tenant_schema import TenantSchemaMiddleware"

- target: src/app/main.py
  marker: FORGE:MIDDLEWARE_REGISTRATION
  position: before
  snippet: "app.add_middleware(TenantSchemaMiddleware)"

# Configure the resolver with the project's CHOSEN strategy + claim/header,
# attaching the settings to app.state. ``render: true`` substitutes the
# resolved forge.toml option values. Runs at APP_POST_CONFIGURE, before the
# lifespan/middleware fire.
- target: src/app/main.py
  marker: FORGE:APP_POST_CONFIGURE
  position: before
  render: true
  snippet: |-
    from app.core.tenancy.config import TenancySettings

    app.state.tenancy_settings = TenancySettings(
        resolution="{{ options['database.tenant_resolution'] }}",
        claim_path="{{ options['database.tenant_claim_path'] }}",
        header_name="{{ options['database.tenant_header_name'] }}",
    )

# Engine "begin" listener: the always-on, fail-closed default binding for EVERY
# session (incl. raw/non-UoW). Reads the request ContextVar (header/subdomain)
# or binds '' when unset.
- target: src/app/core/lifecycle.py
  marker: FORGE:LIFESPAN_STARTUP
  position: before
  snippet: |-
    from app.core.tenancy.schema import register_search_path_listener

    register_search_path_listener(db.engine)

# UoW session binder: post-auth, overwrites the listener's binding with the
# AUTHENTICATED account's tenant schema (the token_claim path). No-op when there
# is no account, so it never clobbers the listener's header/subdomain or
# fail-closed binding.
- target: src/app/core/ioc/security.py
  marker: FORGE:UOW_SESSION_BINDER
  position: before
  snippet: |-
    from app.core.tenancy.schema import bind_tenant_search_path as _schema_session_binder  # noqa: E402

    _SESSION_BINDER = _schema_session_binder
