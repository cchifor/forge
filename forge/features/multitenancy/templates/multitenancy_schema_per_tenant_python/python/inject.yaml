# multitenancy_schema_per_tenant_python: wire schema-per-tenant isolation.
#
# The per-transaction search_path is bound by the UoW ``session_binder``
# (app.core.tenancy.schema.bind_tenant_search_path), installed at the
# ``FORGE:UOW_SESSION_BINDER`` seam in ioc/security.py. The binder fires inside
# the request handler (post-auth), so it works for ``token_claim`` (tenant from
# the authenticated account) AND for ``header``/``subdomain`` (tenant from the
# edge-resolved ContextVar the middleware sets). It fails closed (empty
# search_path) when no tenant is bound. This replaces the old engine
# "begin" listener as the request-path binder (the imperative ``TenantSchemaHook``
# remains the explicit out-of-band / worker API).
#
# The middleware still runs the resolver and sets the ContextVar so the
# header/subdomain strategies resolve at the request edge.
#
# There is NO migration: schema-per-tenant materializes each tenant's tables in
# its own schema at provision time (app.core.tenancy.schema.provision_tenant_schema),
# not via a one-shot Alembic policy migration.

- target: src/app/main.py
  marker: FORGE:MIDDLEWARE_IMPORTS
  position: before
  snippet: "from app.middleware.tenant_schema import TenantSchemaMiddleware"

- target: src/app/main.py
  marker: FORGE:MIDDLEWARE_REGISTRATION
  position: before
  snippet: "app.add_middleware(TenantSchemaMiddleware)"

# Configure the resolver with the project's CHOSEN strategy + claim/header,
# attaching the settings to app.state. ``render: true`` substitutes the
# resolved forge.toml option values. Runs at APP_POST_CONFIGURE, before the
# lifespan/middleware fire.
- target: src/app/main.py
  marker: FORGE:APP_POST_CONFIGURE
  position: before
  render: true
  snippet: |-
    from app.core.tenancy.config import TenancySettings

    app.state.tenancy_settings = TenancySettings(
        resolution="{{ options['database.tenant_resolution'] }}",
        claim_path="{{ options['database.tenant_claim_path'] }}",
        header_name="{{ options['database.tenant_header_name'] }}",
    )

# Install the per-session search_path binder on the request UoWs. The binder
# owns the request-path search_path (post-auth, inside the handler txn) — this
# is what makes schema_per_tenant + token_claim work.
- target: src/app/core/ioc/security.py
  marker: FORGE:UOW_SESSION_BINDER
  position: before
  snippet: |-
    from app.core.tenancy.schema import bind_tenant_search_path as _schema_session_binder

    _SESSION_BINDER = _schema_session_binder
