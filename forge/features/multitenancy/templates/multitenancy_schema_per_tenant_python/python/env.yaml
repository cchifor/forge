# Tenant-resolution defaults for schema-per-tenant multitenancy. The
# TENANT_SCHEMA_PREFIX default is set on the fragment impl spec (env_vars) so it
# stays alongside the routing code; these knobs drive the TenantResolver and
# mirror the database.tenant_* forge options.
TENANT_RESOLUTION: "token_claim"
TENANT_CLAIM_PATH: "tenant_id"
TENANT_HEADER_NAME: "X-Tenant-ID"
