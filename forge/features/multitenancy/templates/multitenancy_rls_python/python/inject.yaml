# multitenancy_rls_python: wire shared-RLS tenant isolation. Three seams:
#
#   1. Register TenantRLSMiddleware on the app at the MIDDLEWARE markers in
#      main.py. Starlette applies add_middleware in REVERSE order (last added
#      = outermost), so registering tenant-RLS at the MIDDLEWARE_REGISTRATION
#      marker (which the auth middleware also targets, auth injected later =
#      added later = outermost) keeps auth OUTSIDE tenant-RLS: the identity is
#      bound before the resolver reads request.state.identity.
#
#   2. Install the engine "begin" listener at startup (LIFESPAN_STARTUP), after
#      the session factory is published. It reads the request's tenant ContextVar
#      and issues SET LOCAL app.current_tenant on each transaction begin. No-op
#      on non-postgres engines.
#
# The RLS policy + ENABLE ROW LEVEL SECURITY ship as the idempotent migration
# alembic/versions/0002_enable_rls.py (a plain file, not an injection).

- target: src/app/main.py
  marker: FORGE:MIDDLEWARE_IMPORTS
  position: before
  snippet: "from app.middleware.tenant_rls import TenantRLSMiddleware"

- target: src/app/main.py
  marker: FORGE:MIDDLEWARE_REGISTRATION
  position: before
  snippet: "app.add_middleware(TenantRLSMiddleware)"

# Configure the resolver with the project's CHOSEN strategy + claim/header,
# attaching the settings to app.state. ``render: true`` substitutes the
# resolved option values so the generated code's defaults match the forge.toml
# selection (env vars still override at runtime). Runs at APP_POST_CONFIGURE,
# before the lifespan/middleware fire.
- target: src/app/main.py
  marker: FORGE:APP_POST_CONFIGURE
  position: before
  render: true
  snippet: |-
    from app.core.tenancy.config import TenancySettings

    app.state.tenancy_settings = TenancySettings(
        resolution="{{ options['database.tenant_resolution'] }}",
        claim_path="{{ options['database.tenant_claim_path'] }}",
        header_name="{{ options['database.tenant_header_name'] }}",
    )

- target: src/app/core/lifecycle.py
  marker: FORGE:LIFESPAN_STARTUP
  position: before
  snippet: |-
    from app.core.tenancy.rls import register_rls_listener

    register_rls_listener(db.engine)
