# Tenant-resolution defaults for shared-RLS multitenancy. The TENANT_RLS_GUC
# default is set on the fragment impl spec (env_vars) so the GUC name and the
# RLS migration policy stay in lock-step; these three knobs drive the
# TenantResolver and mirror the database.tenant_* forge options.
TENANT_RESOLUTION: "token_claim"
TENANT_CLAIM_PATH: "tenant_id"
TENANT_HEADER_NAME: "X-Tenant-ID"
